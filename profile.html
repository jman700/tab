<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab — Profile</title>
  <meta name="theme-color" content="#B8872A" />
  <meta property="og:title" content="Tab — Profile" />
  <meta property="og:description" content="Snap a receipt, claim your items, settle in one tap." />
  <meta property="og:image" content="https://tab-gray.vercel.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://tab-gray.vercel.app/og-image.png" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 36'><rect x='1.5' y='1.5' width='27' height='30' rx='3' fill='%23B8872A' fill-opacity='0.15' stroke='%23B8872A' stroke-width='2'/><path d='M7 12h16M7 18h16M7 24h10' stroke='%23B8872A' stroke-width='2.5' stroke-linecap='round'/></svg>" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="/dashboard.html" class="btn btn-ghost btn-sm">← Back</a>
    <a href="/dashboard.html" class="brand">
      <svg width="16" height="19" viewBox="0 0 30 36" fill="none" aria-hidden="true">
        <rect x="1.5" y="1.5" width="27" height="30" rx="3" fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1.5"/>
        <path d="M7 12h16M7 18h16M7 24h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      tab
    </a>
    <div style="width:72px;"></div>
  </div>
</header>

<main class="container page" style="padding-top:28px;max-width:460px;">
  <h1 style="margin-bottom:6px;">Profile</h1>
  <p class="text-muted mb-16" style="font-size:14px;">Your identity across all bills.</p>

  <div class="card">
    <div class="field mb-16">
      <label for="name-input">Display Name</label>
      <input class="input" id="name-input" type="text" placeholder="Your name" autocomplete="name" />
    </div>

    <div class="field mb-24">
      <label>Phone Number</label>
      <input class="input" id="phone-display" type="tel" disabled style="background:var(--surface-2);color:var(--text-muted);" />
      <span style="font-size:12px;color:var(--text-muted);margin-top:4px;display:block;">
        Phone is your identity — it cannot be changed here.
      </span>
    </div>

    <div class="field mb-8">
      <label>Payment Methods <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;color:var(--text-muted);">— optional</span></label>
      <div id="payment-methods-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:10px;"></div>
      <button class="btn btn-ghost btn-sm" id="add-method-btn" style="width:100%;border:1px dashed var(--border);">+ Add payment method</button>
      <span style="font-size:12px;color:var(--text-muted);margin-top:6px;display:block;">
        Guests will see pay buttons for each method you add. Deep links open Venmo, Cash App, and PayPal with your amount pre-filled.
      </span>
    </div>

    <button class="btn btn-primary btn-full mt-4" id="save-btn">Save Changes</button>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/utils.js"></script>
<script>
  const user = Auth.requireAuth();
  if (!user) throw new Error('Not authenticated');

  $('phone-display').value = Auth.formatPhone(user.phone);
  $('name-input').value    = user.name;

  const METHOD_TYPES = [
    { value: 'venmo',    label: 'Venmo'       },
    { value: 'cashapp',  label: 'Cash App'    },
    { value: 'paypal',   label: 'PayPal'      },
    { value: 'zelle',    label: 'Zelle'       },
    { value: 'applepay', label: 'Apple Cash'  },
  ];

  let paymentMethods = []; // [{type, handle}]

  function renderPaymentMethods() {
    const list = $('payment-methods-list');
    if (!paymentMethods.length) { list.innerHTML = ''; return; }
    list.innerHTML = paymentMethods.map((m, idx) => {
      const cfg    = PAYMENT_METHODS_CONFIG[m.type] || {};
      const prefix = cfg.prefix || '';
      return `
        <div style="display:flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;">
          <select class="input" style="flex:0 0 106px;padding:5px 6px;font-size:13px;" onchange="updateMethod(${idx},'type',this.value)">
            ${METHOD_TYPES.map(t => `<option value="${t.value}"${m.type===t.value?' selected':''}>${escHtml(t.label)}</option>`).join('')}
          </select>
          ${prefix ? `<span style="font-size:13px;color:var(--text-muted);flex-shrink:0;">${escHtml(prefix)}</span>` : ''}
          <input class="input" style="flex:1;padding:5px 8px;font-size:13px;" placeholder="${escHtml(cfg.placeholder||'handle')}" value="${escHtml(m.handle||'')}" oninput="updateMethod(${idx},'handle',this.value)" />
          <button style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:20px;line-height:1;padding:0 2px;flex-shrink:0;" onclick="removeMethod(${idx})" title="Remove">×</button>
        </div>`;
    }).join('');
  }

  function updateMethod(idx, field, val) {
    paymentMethods[idx] = { ...paymentMethods[idx], [field]: val };
    if (field === 'type') renderPaymentMethods();
  }

  function removeMethod(idx) {
    paymentMethods.splice(idx, 1);
    renderPaymentMethods();
  }

  $('add-method-btn').addEventListener('click', () => {
    const usedTypes = new Set(paymentMethods.map(m => m.type));
    const nextType  = METHOD_TYPES.find(t => !usedTypes.has(t.value))?.value || 'venmo';
    paymentMethods.push({ type: nextType, handle: '' });
    renderPaymentMethods();
  });

  async function loadProfile() {
    const { data } = await db.from('users')
      .select('name, venmo_handle, payment_methods')
      .eq('phone', user.phone).single();
    if (!data) return;
    $('name-input').value = data.name || user.name;

    let methods = Array.isArray(data.payment_methods) && data.payment_methods.length
      ? data.payment_methods
      : [];
    // Migrate legacy venmo_handle if no methods stored yet
    if (!methods.length && data.venmo_handle) {
      methods = [{ type: 'venmo', handle: data.venmo_handle }];
    }
    paymentMethods = methods;
    renderPaymentMethods();
  }

  $('save-btn').addEventListener('click', async () => {
    const name = $('name-input').value.trim();
    if (!name) return showToast('Name cannot be empty', 'error');

    const btn = $('save-btn');
    btn.disabled    = true;
    btn.textContent = 'Saving…';

    // Normalize handles before saving
    const cleanMethods = paymentMethods
      .map(m => ({ type: m.type, handle: paymentNormalizeHandle(m.type, m.handle) }))
      .filter(m => m.handle);

    // Keep venmo_handle in sync for backward compat
    const venmoMethod = cleanMethods.find(m => m.type === 'venmo');
    const venmoHandle = venmoMethod?.handle || null;

    try {
      await Promise.all([
        db.from('users').upsert({
          phone:           user.phone,
          name,
          venmo_handle:    venmoHandle,
          payment_methods: cleanMethods,
          updated_at:      new Date().toISOString(),
        }, { onConflict: 'phone' }),
        db.from('guests').update({ name }).eq('phone', user.phone),
      ]);

      Auth.updateLocalUser({ name });
      showToast('Profile saved!', 'success');
      btn.textContent = 'Saved ✓';
      setTimeout(() => { btn.disabled = false; btn.textContent = 'Save Changes'; }, 2000);
    } catch (err) {
      const msg = err?.message || JSON.stringify(err);
      showToast(`Save failed: ${msg}`, 'error', 6000);
      btn.disabled    = false;
      btn.textContent = 'Save Changes';
    }
  });

  loadProfile();
</script>
</body>
</html>
