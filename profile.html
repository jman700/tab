<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab — Profile</title>
  <meta name="theme-color" content="#B8872A" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧾</text></svg>" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="/dashboard.html" class="btn btn-ghost btn-sm">← Back</a>
    <a href="/dashboard.html" class="brand">
      <svg width="16" height="19" viewBox="0 0 30 36" fill="none" aria-hidden="true">
        <rect x="1.5" y="1.5" width="27" height="30" rx="3" fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1.5"/>
        <path d="M7 12h16M7 18h16M7 24h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      tab
    </a>
    <div style="width:72px;"></div>
  </div>
</header>

<main class="container page" style="padding-top:28px;max-width:460px;">
  <h1 style="margin-bottom:6px;">Profile</h1>
  <p class="text-muted mb-16" style="font-size:14px;">Your identity across all bills.</p>

  <div class="card">
    <div class="field mb-16">
      <label for="name-input">Display Name</label>
      <input class="input" id="name-input" type="text" placeholder="Your name" autocomplete="name" />
    </div>

    <div class="field mb-16">
      <label>Phone Number</label>
      <input class="input" id="phone-display" type="tel" disabled style="background:var(--surface-2);color:var(--text-muted);" />
      <span style="font-size:12px;color:var(--text-muted);margin-top:4px;display:block;">
        Phone is your identity — it cannot be changed here.
      </span>
    </div>

    <div class="field mb-16">
      <label for="venmo-input">Venmo Handle <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;">(optional)</span></label>
      <div style="display:flex;align-items:stretch;gap:0;">
        <span style="display:flex;align-items:center;padding:0 12px;background:var(--surface);border:1px solid var(--border);border-right:none;border-radius:var(--radius-sm) 0 0 var(--radius-sm);color:var(--text-muted);font-size:15px;flex-shrink:0;">@</span>
        <input class="input" id="venmo-input" type="text" placeholder="yourhandle"
               style="border-radius:0 var(--radius-sm) var(--radius-sm) 0;border-left:none;" />
      </div>
      <span style="font-size:12px;color:var(--text-muted);margin-top:4px;display:block;">
        Guests on your bills will see a "Pay on Venmo" button with your handle.
      </span>
    </div>

    <button class="btn btn-primary btn-full" id="save-btn">Save Changes</button>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/utils.js"></script>
<script>
  const user = Auth.requireAuth();
  if (!user) throw new Error('Not authenticated');

  $('phone-display').value = Auth.formatPhone(user.phone);
  $('name-input').value    = user.name;

  async function loadProfile() {
    const { data } = await db.from('users').select('name, venmo_handle').eq('phone', user.phone).single();
    if (data) {
      $('name-input').value  = data.name || user.name;
      $('venmo-input').value = data.venmo_handle || '';
    }
  }

  $('save-btn').addEventListener('click', async () => {
    const name  = $('name-input').value.trim();
    const venmo = $('venmo-input').value.trim().replace(/^@/, '');

    if (!name) return showToast('Name cannot be empty', 'error');

    const btn = $('save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    try {
      await Promise.all([
        // Update profile table
        db.from('users').upsert({
          phone:        user.phone,
          name,
          venmo_handle: venmo || null,
          updated_at:   new Date().toISOString(),
        }, { onConflict: 'phone' }),
        // Propagate name change to all guest rows
        db.from('guests').update({ name }).eq('phone', user.phone),
      ]);

      Auth.updateLocalUser({ name });
      showToast('Profile saved!', 'success');
      btn.textContent = 'Saved ✓';
      setTimeout(() => { btn.disabled = false; btn.textContent = 'Save Changes'; }, 2000);
    } catch (err) {
      const msg = err?.message || JSON.stringify(err);
      showToast(`Save failed: ${msg}`, 'error', 6000);
      btn.disabled = false;
      btn.textContent = 'Save Changes';
    }
  });

  loadProfile();
</script>
</body>
</html>
