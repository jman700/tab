<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab — Bill</title>
  <meta name="description" content="Claim your items and see your share of the bill." />
  <meta property="og:title"       content="Tab — Split this bill" />
  <meta property="og:description" content="Tap what you had and see exactly what you owe." />
  <meta property="og:type"        content="website" />
  <meta name="theme-color"        content="#B8872A" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧾</text></svg>" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="header">
  <div class="header-inner">
    <button class="btn btn-ghost btn-sm" id="back-btn">← Dashboard</button>
    <a href="/dashboard.html" class="brand">
      <svg width="16" height="19" viewBox="0 0 30 36" fill="none" aria-hidden="true">
        <rect x="1.5" y="1.5" width="27" height="30" rx="3" fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1.5"/>
        <path d="M7 12h16M7 18h16M7 24h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      tab
    </a>
    <button class="btn btn-secondary btn-sm" id="share-btn">Share</button>
  </div>
</header>

<div class="bill-hero" id="bill-hero">
  <h1 id="bill-name">Loading…</h1>
  <p id="bill-meta"></p>
</div>

<main class="container page" id="main" style="padding-top:0;">

  <!-- Owner banner -->
  <div class="owner-banner hidden" id="owner-banner">
    ✦ You created this bill — only you can manage guests and close it.
  </div>

  <!-- Guests section -->
  <div class="guests-section" id="guests-section">
    <div class="guests-header">
      <span class="label">Guests (<span id="guest-count">0</span>)</span>
      <button class="btn btn-ghost btn-sm" id="toggle-guests-btn">Show</button>
    </div>
    <div id="guests-list" style="display:none;"></div>
  </div>

  <!-- Confirm banner -->
  <div class="confirm-banner hidden" id="confirm-banner">
    <p id="confirm-msg">Confirm your items before the bill is closed.</p>
    <button class="btn btn-primary btn-sm" id="confirm-btn">Confirm</button>
  </div>

  <!-- Items -->
  <div class="items-section mt-16">
    <div class="section-head mb-12">
      <h2 style="font-size:18px;">Items</h2>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="text-muted" style="font-size:13px;" id="unclaimed-notice"></span>
        <div class="toggle-group hidden" id="currency-toggle" style="font-size:12px;"></div>
      </div>
    </div>
    <p id="rate-note" class="hidden" style="font-size:11px;color:var(--text-muted);margin-top:-8px;margin-bottom:12px;"></p>
    <div id="items-list"></div>
  </div>

  <!-- Owner: close bill -->
  <div id="owner-controls" class="hidden mt-16 mb-16">
    <button class="btn btn-danger btn-full" id="close-bill-btn">Close Bill</button>
  </div>

  <!-- Closed bill notice -->
  <div class="card hidden mt-16 mb-16" id="closed-notice" style="text-align:center;padding:24px;">
    <div style="font-size:24px;margin-bottom:8px;">✓</div>
    <h3 style="font-family:var(--font-display);font-weight:500;margin-bottom:4px;">Bill Closed</h3>
    <p class="text-muted" style="font-size:14px;">This bill has been finalized.</p>
  </div>

</main>

<!-- Sticky footer -->
<div class="bill-footer">
  <div class="bill-footer-inner">
    <div>
      <span class="footer-label">Your Total</span>
      <span class="footer-amount" id="my-total">$0</span>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-secondary" id="receipt-btn">Receipt</button>
      <button class="btn btn-primary"   id="summary-btn">Summary</button>
    </div>
  </div>
</div>

<!-- Receipt Sheet -->
<div class="sheet-backdrop" id="receipt-backdrop" style="display:none;"></div>
<div class="sheet" id="receipt-sheet" style="display:none;">
  <div class="sheet-handle"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <h2 style="margin:0;">Receipt</h2>
    <button class="btn btn-primary btn-sm" id="save-receipt-btn">Save / Share</button>
  </div>
  <div id="receipt-preview" style="overflow-y:auto;-webkit-overflow-scrolling:touch;text-align:center;background:#FDFBF6;border-radius:10px;padding:8px;max-height:58vh;"></div>
  <button class="btn btn-ghost btn-full mt-16" id="close-receipt-btn">Done</button>
</div>

<!-- Summary Sheet -->
<div class="sheet-backdrop" id="summary-backdrop" style="display:none;"></div>
<div class="sheet" id="summary-sheet" style="display:none;">
  <div class="sheet-handle"></div>
  <h2>Bill Summary</h2>
  <p class="sheet-meta" id="summary-meta"></p>
  <div id="summary-list"></div>
  <hr class="summary-divider" />
  <div id="summary-totals"></div>
  <button class="btn btn-primary btn-full mt-16" id="close-summary-btn">Done</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/utils.js"></script>
<script>
  const user = Auth.requireAuth();
  if (!user) throw new Error('Not authenticated');

  // ── State ────────────────────────────────────────────────
  let bill     = null;
  let items    = [];
  let guests   = [];
  let claims   = [];
  let isOwner  = false;
  let myGuest  = null;
  let guestsVisible  = false;
  let billCurrency   = 'USD';
  let showConverted  = false;
  let exchangeRate   = null;

  function display(amount) {
    if (showConverted && exchangeRate) return fmtCurrency((amount || 0) * exchangeRate, 'USD');
    return fmtCurrency(amount, billCurrency);
  }

  const billId = getBillIdFromUrl();
  if (!billId) navigateTo('/dashboard.html');

  // ── Init ─────────────────────────────────────────────────
  async function init() {
    await loadAll();
    await ensureJoined();
    render();
    setupCurrencyToggle();
    setupItemEdit();
    subscribeRealtime();
  }

  function setupItemEdit() {
    $('items-list').addEventListener('click', e => {
      const el = e.target.closest('[data-editable]');
      if (!el || !isOwner || bill.status === 'closed') return;

      const field  = el.dataset.editable;
      const itemId = el.dataset.itemId;
      const item   = items.find(i => i.id === itemId);
      if (!item) return;

      const input = document.createElement('input');
      input.type        = 'text';
      input.className   = field === 'name' ? 'item-edit-input item-edit-name' : 'item-edit-input item-edit-note';
      input.value       = field === 'name' ? item.name : (item.note || '');
      input.placeholder = field === 'name' ? 'Item name' : 'Note (optional)';
      el.replaceWith(input);
      input.focus();
      input.select();

      let committed = false;
      async function commit() {
        if (committed) return;
        committed = true;
        const newVal   = input.value.trim();
        const saveVal  = newVal || (field === 'name' ? 'Unnamed Item' : null);
        item[field]    = saveVal;
        renderItems();
        const { error } = await db.from('items').update({ [field]: saveVal }).eq('id', itemId);
        if (error) showToast('Could not save — try again', 'error');
      }

      input.addEventListener('blur', commit);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter')  { e.preventDefault(); commit(); }
        if (e.key === 'Escape') { committed = true; renderItems(); }
      });
    });
  }

  function setupCurrencyToggle() {
    billCurrency = bill.currency || 'USD';
    if (billCurrency === 'USD') return;

    const toggleEl = $('currency-toggle');
    toggleEl.innerHTML = `
      <button class="toggle-btn active" id="btn-orig">${billCurrency}</button>
      <button class="toggle-btn" id="btn-usd">USD</button>
    `;
    show(toggleEl);

    $('btn-orig').addEventListener('click', () => {
      showConverted = false;
      $('btn-orig').classList.add('active');
      $('btn-usd').classList.remove('active');
      hide($('rate-note'));
      renderItems(); renderMyTotal(); renderGuests();
    });

    $('btn-usd').addEventListener('click', () => {
      if (!exchangeRate) return showToast('Exchange rate unavailable — try again shortly', 'error');
      showConverted = true;
      $('btn-usd').classList.add('active');
      $('btn-orig').classList.remove('active');
      show($('rate-note'));
      renderItems(); renderMyTotal(); renderGuests();
    });

    getExchangeRate(billCurrency, 'USD').then(rate => {
      exchangeRate = rate;
      if (rate) {
        setText('rate-note', `1 ${billCurrency} = ${fmtCurrency(rate, 'USD')} · Frankfurter / ECB`);
      }
    });
  }

  async function loadAll() {
    const [billRes, itemsRes, guestsRes, claimsRes] = await Promise.all([
      db.from('bills').select('*').eq('id', billId).single(),
      db.from('items').select('*').eq('bill_id', billId).order('position'),
      db.from('guests').select('*').eq('bill_id', billId).order('joined_at'),
      db.from('claims').select('*').eq('bill_id', billId),
    ]);

    if (billRes.error || !billRes.data) { navigateTo('/dashboard.html'); return; }

    bill   = billRes.data;
    items  = itemsRes.data  || [];
    guests = guestsRes.data || [];
    claims = claimsRes.data || [];

    isOwner = bill.created_by_phone === user.phone;
    myGuest = guests.find(g => g.phone === user.phone) || null;

    document.title = `Tab — ${bill.name}`;
    setText('bill-name', bill.name);
    setText('bill-meta', `${formatDate(bill.created_at)} · ${guests.length} guest${guests.length !== 1 ? 's' : ''}`);
  }

  // ── Auto-join as guest ────────────────────────────────────
  async function ensureJoined() {
    if (myGuest) {
      const fp = Auth.getFingerprint();
      if (myGuest.device_fingerprint !== fp) {
        await db.from('guests').update({ device_fingerprint: fp }).eq('id', myGuest.id);
      }
      return;
    }

    if (bill.status === 'closed') return;

    const { data: newGuest, error } = await db.from('guests').insert({
      bill_id:            billId,
      name:               user.name,
      phone:              user.phone,
      device_fingerprint: Auth.getFingerprint(),
    }).select().single();

    if (!error && newGuest) {
      guests.push(newGuest);
      myGuest = newGuest;
    }
  }

  // ── Render ────────────────────────────────────────────────
  function render() {
    renderHeader();
    renderGuests();
    renderItems();
    renderConfirmBanner();
    renderMyTotal();
    if (bill.status === 'closed') {
      show($('closed-notice'));
      hide($('owner-controls'));
    } else if (isOwner) {
      show($('owner-controls'));
    }
  }

  function renderHeader() {
    if (isOwner) show($('owner-banner'));
    setText('guest-count', guests.length);
    setText('bill-meta', `${formatDate(bill.created_at)} · ${guests.length} guest${guests.length !== 1 ? 's' : ''}`);
  }

  function renderGuests() {
    const list = $('guests-list');
    if (!guests.length) {
      list.innerHTML = '<div style="padding:12px 16px;font-size:14px;color:var(--text-muted);">No guests yet.</div>';
      return;
    }

    list.innerHTML = guests.map((g, i) => {
      const color        = getPersonColor(i);
      const isMe         = g.phone === user.phone;
      const myShare      = getPersonShare(g.phone, claims, items, guests, bill);
      const ownerTag     = bill.created_by_phone === g.phone
        ? '<span class="badge badge-setup" style="font-size:10px;">Owner</span>' : '';
      const paidBtn      = isOwner && !isMe
        ? `<button class="paid-toggle ${g.has_paid ? 'paid' : ''}" onclick="togglePaid('${g.id}', ${!g.has_paid})">${g.has_paid ? '✓ Paid' : 'Mark Paid'}</button>` : '';
      const removeBtn    = isOwner && !isMe
        ? `<button class="btn-icon" title="Remove guest" onclick="removeGuest('${g.id}', '${escHtml(g.name)}')">×</button>` : '';
      const confirmedDot = g.has_confirmed
        ? `<span style="font-size:10px;color:var(--green);">✓ confirmed</span>` : '';

      return `
        <div class="guest-row" id="guest-${g.id}">
          <div class="guest-avatar" style="background:${color}22;color:${color};border:1.5px solid ${color}44;">
            ${getInitials(g.name)}
          </div>
          <div class="guest-info">
            <div class="guest-name">${escHtml(g.name)}${isMe ? ' <span style="color:var(--text-muted);font-size:12px;">(you)</span>' : ''} ${ownerTag}</div>
            <div class="guest-phone">${Auth.formatPhone(g.phone)} ${confirmedDot}</div>
          </div>
          <div class="guest-actions">
            ${display(myShare)}
            ${paidBtn}
            ${removeBtn}
          </div>
        </div>
      `;
    }).join('');
  }

  function renderItems() {
    const list = $('items-list');
    if (!items.length) {
      list.innerHTML = '<div class="empty"><p>No items found.</p></div>';
      return;
    }

    let unclaimedCount = 0;

    list.innerHTML = items.map(item => {
      let myItemShare = 0;

      const chips = Array.from({ length: item.quantity }, (_, unitIdx) => {
        const unitClaims = claims.filter(c => c.item_id === item.id && c.unit_index === unitIdx);
        const isEmpty    = unitClaims.length === 0;
        const isMine     = unitClaims.some(c => c.guest_phone === user.phone);

        if (isEmpty) unclaimedCount++;
        if (isMine)  myItemShare += item.price / unitClaims.length;

        const avatars = unitClaims.map(c => {
          const g     = guests.find(x => x.phone === c.guest_phone);
          const gIdx  = guests.findIndex(x => x.phone === c.guest_phone);
          const color = getPersonColor(gIdx >= 0 ? gIdx : 0);
          return `<div class="chip-avatar" style="background:${color}22;color:${color};border:1.5px solid ${color};">${getInitials(g ? g.name : '?')}</div>`;
        }).join('');

        const splitLabel   = unitClaims.length > 1 ? `<span class="chip-split">÷${unitClaims.length}</span>` : '';
        const claimedStyle = !isEmpty ? 'border-style:solid;background:var(--surface-2);' : '';
        const canClaim     = bill.status !== 'closed';

        return `
          <button
            class="chip ${isEmpty ? '' : 'claimed'}"
            style="${claimedStyle}"
            ${canClaim ? `onclick="toggleClaim('${item.id}', ${unitIdx})"` : 'disabled'}
            title="${isEmpty ? 'Claim this item' : isMine ? 'Unclaim' : 'Join split'}"
          >
            ${isEmpty ? '<span style="color:var(--border-strong);font-size:20px;line-height:1;">+</span>' : avatars}
            ${splitLabel}
          </button>
        `;
      }).join('');

      const hasMine = myItemShare > 0;
      const canEdit = isOwner && bill.status !== 'closed';
      const nameHtml = canEdit
        ? `<div class="item-claim-name item-editable" data-editable="name" data-item-id="${item.id}">${escHtml(item.name)}</div>`
        : `<div class="item-claim-name">${escHtml(item.name)}</div>`;
      const noteHtml = canEdit
        ? (item.note
            ? `<div class="item-claim-note item-editable" data-editable="note" data-item-id="${item.id}">${escHtml(item.note)}</div>`
            : `<div class="item-add-note" data-editable="note" data-item-id="${item.id}">+ Add note</div>`)
        : (item.note ? `<div class="item-claim-note">${escHtml(item.note)}</div>` : '');

      return `
        <div class="item-claim-row ${hasMine ? 'has-mine' : ''}" id="item-${item.id}">
          <div class="item-claim-top">
            <div>
              ${nameHtml}
              ${noteHtml}
            </div>
            <div class="item-claim-price">
              ${display(item.price)} <span>/ each</span>
            </div>
          </div>
          <div class="claim-chips">${chips}</div>
          ${hasMine ? `<div class="item-my-share">Your share: ${display(myItemShare)}</div>` : ''}
        </div>
      `;
    }).join('');

    const notice = $('unclaimed-notice');
    if (notice) notice.textContent = unclaimedCount > 0 ? `${unclaimedCount} unclaimed` : '';
  }

  function renderConfirmBanner() {
    if (bill.status === 'closed' || !myGuest) return;
    const myClaimsCount = claims.filter(c => c.guest_phone === user.phone).length;
    if (myClaimsCount === 0) return;

    const banner = $('confirm-banner');
    show(banner);

    if (myGuest.has_confirmed) {
      banner.classList.add('confirmed');
      setText('confirm-msg', '✓ You\'ve confirmed your items.');
      hide($('confirm-btn'));
    } else {
      banner.classList.remove('confirmed');
      setText('confirm-msg', 'Confirm your items before the bill is closed.');
      show($('confirm-btn'));
    }
  }

  function renderMyTotal() {
    const total = getPersonShare(user.phone, claims, items, guests, bill);
    const el    = $('my-total');
    if (el) {
      el.textContent  = display(total);
      el.style.color  = total > 0 ? 'var(--accent)' : 'var(--text-muted)';
    }
  }

  // ── Claim Toggle ──────────────────────────────────────────
  async function toggleClaim(itemId, unitIdx) {
    if (!myGuest)              return showToast('You must join the bill first', 'error');
    if (bill.status === 'closed') return;

    const existing = claims.find(
      c => c.item_id === itemId && c.unit_index === unitIdx && c.guest_phone === user.phone
    );

    if (existing) {
      // Optimistic remove
      claims = claims.filter(c => c.id !== existing.id);
      renderItems();
      renderMyTotal();
      renderConfirmBanner();
      await db.from('claims').delete().eq('id', existing.id);
    } else {
      // Optimistic add
      const tmpId    = `tmp_${Date.now()}`;
      const newClaim = { id: tmpId, bill_id: billId, item_id: itemId, unit_index: unitIdx, guest_phone: user.phone };
      claims.push(newClaim);
      renderItems();
      renderMyTotal();
      renderConfirmBanner();

      const { data: saved, error } = await db.from('claims').insert({
        bill_id:     billId,
        item_id:     itemId,
        unit_index:  unitIdx,
        guest_phone: user.phone,
      }).select().single();

      if (error) {
        // Rollback on failure
        claims = claims.filter(c => c.id !== tmpId);
        renderItems();
        renderMyTotal();
        showToast('Could not claim item — try again', 'error');
      } else {
        claims = claims.map(c => c.id === tmpId ? saved : c);
      }
    }
  }

  // ── Confirm Items ─────────────────────────────────────────
  $('confirm-btn').addEventListener('click', async () => {
    if (!myGuest) return;
    const { error } = await db.from('guests').update({ has_confirmed: true }).eq('id', myGuest.id);
    if (error) return showToast('Could not confirm — try again', 'error');
    myGuest          = { ...myGuest, has_confirmed: true };
    guests           = guests.map(g => g.id === myGuest.id ? myGuest : g);
    renderConfirmBanner();
    renderGuests();
    showToast('Items confirmed!', 'success');
  });

  // ── Owner: toggle paid ────────────────────────────────────
  async function togglePaid(guestId, paid) {
    const { error } = await db.from('guests').update({ has_paid: paid }).eq('id', guestId);
    if (error) return showToast('Could not update — try again', 'error');
    guests = guests.map(g => g.id === guestId ? { ...g, has_paid: paid } : g);
    renderGuests();
    showToast(paid ? 'Marked as paid' : 'Marked as unpaid');
  }

  // ── Owner: remove guest ───────────────────────────────────
  async function removeGuest(guestId, name) {
    if (!isOwner) return;
    if (!confirm(`Remove ${name} from this bill? Their claims will be cleared.`)) return;

    const g = guests.find(x => x.id === guestId);
    if (!g) return;

    claims = claims.filter(c => c.guest_phone !== g.phone);
    guests = guests.filter(x => x.id !== guestId);

    await Promise.all([
      db.from('claims').delete().eq('bill_id', billId).eq('guest_phone', g.phone),
      db.from('guests').delete().eq('id', guestId),
    ]);

    renderGuests();
    renderItems();
    renderMyTotal();
    setText('guest-count', guests.length);
    showToast(`${name} removed`);
  }

  // ── Owner: close bill ─────────────────────────────────────
  $('close-bill-btn').addEventListener('click', async () => {
    if (!isOwner) return;
    if (!confirm('Close this bill? Claims will be locked.')) return;

    const { error } = await db.from('bills').update({
      status: 'closed', closed_at: new Date().toISOString(),
    }).eq('id', billId);

    if (error) return showToast('Could not close bill — try again', 'error');

    bill = { ...bill, status: 'closed' };
    show($('closed-notice'));
    hide($('owner-controls'));
    renderItems();
    showToast('Bill closed', 'success');
  });

  // ── Share ─────────────────────────────────────────────────
  $('share-btn').addEventListener('click', () => copyToClipboard(window.location.href));

  // ── Guests toggle ─────────────────────────────────────────
  $('toggle-guests-btn').addEventListener('click', () => {
    guestsVisible = !guestsVisible;
    $('guests-list').style.display = guestsVisible ? 'block' : 'none';
    setText('toggle-guests-btn', guestsVisible ? 'Hide' : 'Show');
  });

  $('back-btn').addEventListener('click', () => navigateTo('/dashboard.html'));

  // ── Receipt Sheet ─────────────────────────────────────────
  $('receipt-btn').addEventListener('click', () => {
    $('receipt-preview').innerHTML = '';
    $('receipt-preview').appendChild(buildReceiptCanvas());
    openSheet('receipt-backdrop', 'receipt-sheet');
  });
  $('close-receipt-btn').addEventListener('click',  () => closeSheet('receipt-backdrop', 'receipt-sheet'));
  $('receipt-backdrop').addEventListener('click',   () => closeSheet('receipt-backdrop', 'receipt-sheet'));
  $('save-receipt-btn').addEventListener('click', () => {
    const canvas = $('receipt-preview').querySelector('canvas');
    if (!canvas) return;
    const fileName = `${bill.name.replace(/[^a-z0-9]/gi, '-').toLowerCase()}-receipt.png`;
    canvas.toBlob(async blob => {
      const file = new File([blob], fileName, { type: 'image/png' });
      if (navigator.share && navigator.canShare?.({ files: [file] })) {
        try { await navigator.share({ files: [file], title: `${bill.name} Receipt` }); return; }
        catch (e) { if (e.name === 'AbortError') return; }
      }
      const url = URL.createObjectURL(blob);
      const a   = document.createElement('a');
      a.href = url; a.download = fileName; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }, 'image/png');
  });

  function buildReceiptCanvas() {
    const currency = bill.currency || 'USD';
    const subtotal = items.reduce((s, i) => s + i.price * i.quantity, 0);
    const tax      = bill.tax_included ? 0 : (bill.tax_amount || 0);
    const tip      = subtotal * ((bill.tip_percentage || 0) / 100);
    const money    = n => fmtCurrency(n, currency);

    const W   = 360;
    const P   = 24;
    const IW  = W - P * 2;
    const DPR = 2;

    // Pre-calculate canvas height
    let h = P;
    h += 28 + 12 + 2 + 12;
    h += 20 + 18 + 12 + 2 + 12;
    h += 16 + 8 + 1 + 8;
    items.forEach(item => { h += 22; if (item.note) h += 16; });
    h += 8 + 1 + 12;
    h += 20;
    if (tax > 0) h += 20;
    if (tip > 0) h += 20;
    h += 10 + 2 + 8 + 26 + 2 + 16;
    if (currency !== 'USD') h += 16;
    h += 16 + P;

    const canvas  = document.createElement('canvas');
    canvas.width  = W * DPR;
    canvas.height = h * DPR;
    canvas.style.width    = '100%';
    canvas.style.maxWidth = W + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(DPR, DPR);

    // Palette
    const INK = '#1C1208', MUTED = '#8A7A6A', ACCENT = '#B8872A', LINE = '#D4C9B8';
    ctx.fillStyle = '#FDFBF6';
    ctx.fillRect(0, 0, W, h);

    const sans = (sz, bold) => `${bold ? '600 ' : ''}${sz}px -apple-system, BlinkMacSystemFont, sans-serif`;
    const mono = sz => `${sz}px "Courier New", Courier, monospace`;

    function draw(text, x, y_, font, color, align = 'left') {
      ctx.font = font; ctx.fillStyle = color; ctx.textAlign = align;
      ctx.fillText(String(text), x, y_);
    }
    function trunc(text, maxW, font) {
      ctx.font = font;
      if (ctx.measureText(text).width <= maxW) return text;
      let t = text;
      while (t.length > 1 && ctx.measureText(t + '…').width > maxW) t = t.slice(0, -1);
      return t + '…';
    }
    const thickLine = y_ => { ctx.fillStyle = ACCENT; ctx.fillRect(P, y_, IW, 2); };
    const thinLine  = y_ => { ctx.fillStyle = LINE;   ctx.fillRect(P, y_, IW, 1); };

    let y = P;

    // Brand
    draw('tab', P, y + 20, sans(20, true), ACCENT);
    draw('receipt', W - P, y + 20, sans(10, false), MUTED, 'right');
    y += 28;

    y += 12; thickLine(y); y += 2 + 12;

    // Bill name + date
    draw(bill.name, W / 2, y + 15, sans(13, true), INK, 'center');    y += 20;
    draw(formatDate(bill.created_at), W / 2, y + 13, sans(11, false), MUTED, 'center'); y += 18;

    y += 12; thickLine(y); y += 2 + 12;

    // Column headers
    draw('ITEM',   P,               y + 12, mono(9), MUTED);
    draw('QTY',    P + IW * 0.70,   y + 12, mono(9), MUTED, 'right');
    draw('AMOUNT', W - P,           y + 12, mono(9), MUTED, 'right');
    y += 16;
    y += 8; thinLine(y); y += 1 + 8;

    // Items
    const nFont = mono(11), nMaxW = IW * 0.58;
    items.forEach(item => {
      draw(trunc(item.name, nMaxW, nFont), P,             y + 15, nFont,    INK);
      draw(String(item.quantity),          P + IW * 0.70, y + 15, mono(11), INK, 'right');
      draw(money(item.price * item.quantity), W - P,      y + 15, mono(11), INK, 'right');
      y += 22;
      if (item.note) {
        draw(trunc(`  ${item.note}`, IW * 0.88, mono(9)), P, y + 12, mono(9), MUTED);
        y += 16;
      }
    });

    y += 8; thinLine(y); y += 1 + 12;

    // Subtotals
    const totRow = (label, val, y_) => {
      draw(label,     P,     y_ + 14, mono(11), MUTED);
      draw(money(val), W - P, y_ + 14, mono(11), INK, 'right');
    };
    totRow('Subtotal', subtotal, y); y += 20;
    if (tax > 0) { totRow('Tax', tax, y); y += 20; }
    if (tip > 0) { totRow(`Tip (${bill.tip_percentage}%)`, tip, y); y += 20; }

    y += 10; thickLine(y); y += 2 + 8;
    draw('TOTAL',              P,     y + 20, sans(14, true), ACCENT);
    draw(money(bill.grand_total), W - P, y + 20, sans(14, true), ACCENT, 'right');
    y += 26;
    thickLine(y); y += 2 + 16;

    if (currency !== 'USD') {
      draw(`All amounts in ${currency}`, W / 2, y + 12, sans(10, false), MUTED, 'center');
      y += 16;
    }
    draw('Generated by Tab', W / 2, y + 12, sans(10, false), MUTED, 'center');

    return canvas;
  }

  // ── Summary Sheet ─────────────────────────────────────────
  $('summary-btn').addEventListener('click', () => {
    renderSummary();
    openSheet('summary-backdrop', 'summary-sheet');
  });
  $('close-summary-btn').addEventListener('click', () => closeSheet('summary-backdrop', 'summary-sheet'));
  $('summary-backdrop').addEventListener('click',  () => closeSheet('summary-backdrop', 'summary-sheet'));

  function renderSummary() {
    setText('summary-meta', `${bill.name} · ${display(bill.grand_total)} total`);

    const subtotal    = items.reduce((s, i) => s + i.price * i.quantity, 0);

    const summaryList = guests.map((g, i) => {
      const share = getPersonShare(g.phone, claims, items, guests, bill);
      const color = getPersonColor(i);
      const pct   = bill.grand_total > 0 ? (share / bill.grand_total * 100) : 0;
      const isMe  = g.phone === user.phone;
      return `
        <div class="summary-row">
          <div class="summary-avatar" style="background:${color}22;color:${color};border:2px solid ${color}44;">
            ${getInitials(g.name)}
          </div>
          <div class="summary-info">
            <div class="summary-name">${escHtml(g.name)}${isMe ? ' <span style="color:var(--text-muted);font-weight:400;font-size:12px;">(you)</span>' : ''}</div>
            <div class="summary-pct">${pct.toFixed(1)}% of total</div>
            <div class="summary-bar">
              <div class="summary-bar-fill" style="width:${pct}%;background:${color};"></div>
            </div>
          </div>
          <div class="summary-amount" style="color:${color};">${display(share)}</div>
        </div>
      `;
    }).join('');

    setHTML('summary-list', summaryList);

    const tip = subtotal * (bill.tip_percentage / 100);
    setHTML('summary-totals', `
      <div class="summary-total-row"><span class="key">Subtotal</span><span>${display(subtotal)}</span></div>
      <div class="summary-total-row"><span class="key">Tax</span><span>${display(bill.tax_amount)}</span></div>
      <div class="summary-total-row"><span class="key">Tip (${bill.tip_percentage}%)</span><span>${display(tip)}</span></div>
      <div class="summary-final">
        <span class="key">Total</span>
        <span class="val">${display(bill.grand_total)}</span>
      </div>
    `);
  }

  // ── Realtime ──────────────────────────────────────────────
  function subscribeRealtime() {
    db.channel(`bill-${billId}`)
      .on('postgres_changes', { event: '*', schema: 'tab', table: 'claims', filter: `bill_id=eq.${billId}` }, onClaimsChange)
      .on('postgres_changes', { event: '*', schema: 'tab', table: 'guests', filter: `bill_id=eq.${billId}` }, onGuestsChange)
      .on('postgres_changes', { event: '*', schema: 'tab', table: 'bills',  filter: `id=eq.${billId}`      }, onBillChange)
      .subscribe();
  }

  async function onClaimsChange() {
    const { data } = await db.from('claims').select('*').eq('bill_id', billId);
    claims = data || [];
    renderItems();
    renderMyTotal();
    renderConfirmBanner();
  }

  async function onGuestsChange() {
    const { data } = await db.from('guests').select('*').eq('bill_id', billId).order('joined_at');
    guests  = data || [];
    myGuest = guests.find(g => g.phone === user.phone) || null;
    renderGuests();
    setText('guest-count', guests.length);
    setText('bill-meta', `${formatDate(bill.created_at)} · ${guests.length} guest${guests.length !== 1 ? 's' : ''}`);
  }

  async function onBillChange(payload) {
    if (payload.new && payload.new.status === 'closed') {
      bill = { ...bill, ...payload.new };
      show($('closed-notice'));
      hide($('owner-controls'));
      renderItems();
    }
  }

  init();
</script>
</body>
</html>
