<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab — Group</title>
  <meta name="theme-color" content="#B8872A" />
  <meta property="og:title" content="You're invited to a group on Tab" />
  <meta property="og:description" content="Track shared expenses and settle up with your group." />
  <meta property="og:image" content="https://tab-gray.vercel.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://tab-gray.vercel.app/og-image.png" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 36'><rect x='1.5' y='1.5' width='27' height='30' rx='3' fill='%23B8872A' fill-opacity='0.15' stroke='%23B8872A' stroke-width='2'/><path d='M7 12h16M7 18h16M7 24h10' stroke='%23B8872A' stroke-width='2.5' stroke-linecap='round'/></svg>" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<header class="header">
  <div class="header-inner">
    <button class="btn btn-ghost btn-sm" id="back-btn">← Dashboard</button>
    <a href="/dashboard.html#groups" class="brand">
      <svg width="16" height="19" viewBox="0 0 30 36" fill="none" aria-hidden="true">
        <rect x="1.5" y="1.5" width="27" height="30" rx="3" fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1.5"/>
        <path d="M7 12h16M7 18h16M7 24h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      tab
    </a>
    <div style="display:flex;gap:6px;align-items:center;">
      <button class="btn btn-secondary btn-sm" id="invite-btn">Invite</button>
      <button class="btn btn-ghost btn-sm hidden" id="settings-btn" style="padding:6px 10px;display:inline-flex;align-items:center;" title="Group settings" aria-label="Group settings"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></button>
    </div>
  </div>
</header>

<div class="bill-hero" id="group-hero">
  <h1 id="group-name">Loading…</h1>
  <p id="group-meta" style="font-size:14px;color:var(--text-muted);margin-top:4px;"></p>
</div>
<div id="closed-banner" class="hidden" style="background:color-mix(in srgb,var(--accent,#B8872A) 12%,transparent);border-bottom:1px solid color-mix(in srgb,var(--accent,#B8872A) 30%,transparent);padding:10px 16px;text-align:center;">
  <div style="font-size:13px;font-weight:600;color:var(--accent,#B8872A);">Group Finalized</div>
  <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">Expenses are locked — see who you owe below and settle up.</div>
</div>

<main class="container page" id="main" style="padding-top:0;">

  <!-- Tab bar -->
  <div class="toggle-group" id="tab-bar" style="margin-bottom:20px;">
    <button class="toggle-btn active" id="tab-expenses">Expenses</button>
    <button class="toggle-btn" id="tab-balances">Balances</button>
    <button class="toggle-btn" id="tab-members">Members</button>
  </div>

  <!-- Expenses tab -->
  <div id="expenses-tab">
    <div id="expenses-list">
      <div class="bill-card-skeleton">
        <div class="skeleton" style="height:18px;width:55%;margin-bottom:10px;"></div>
        <div class="skeleton" style="height:13px;width:35%;"></div>
      </div>
    </div>
    <button class="btn btn-primary btn-full mt-16" id="add-expense-btn">+ Add Expense</button>
  </div>

  <!-- Balances tab -->
  <div id="balances-tab" style="display:none;">
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px;">
      <button class="btn btn-secondary btn-sm" id="simplify-btn">Simplify</button>
    </div>
    <div id="balances-list">
      <div class="bill-card-skeleton">
        <div class="skeleton" style="height:18px;width:50%;margin-bottom:10px;"></div>
        <div class="skeleton" style="height:13px;width:30%;"></div>
      </div>
    </div>
    <div id="simplified-list" style="display:none;"></div>
  </div>

  <!-- Members tab -->
  <div id="members-tab" style="display:none;">
    <div id="members-list"></div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn btn-secondary" style="flex:1;" id="add-member-btn">+ Add Member</button>
      <button class="btn btn-secondary" style="flex:1;" id="invite-members-btn">Invite Link</button>
    </div>
  </div>

</main>

<!-- Add Expense Sheet -->
<div class="sheet-backdrop" id="expense-backdrop" style="display:none;"></div>
<div class="sheet" id="expense-sheet" style="display:none;">
  <div class="sheet-handle"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <h2 style="margin:0;" id="expense-sheet-title">Add Expense</h2>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn btn-secondary btn-sm" id="scan-receipt-btn" style="display:inline-flex;align-items:center;gap:5px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>Scan</button>
      <button class="btn btn-ghost btn-sm" id="close-expense-btn">✕</button>
    </div>
  </div>
  <input type="file" id="exp-scan-input" accept="image/*" style="display:none;" />
  <div id="exp-scanning-state" style="display:none;text-align:center;padding:16px 0;font-size:14px;color:var(--text-muted);">Scanning receipt with AI…</div>
  <div id="exp-items-preview" style="display:none;background:var(--surface-2);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:12px;font-size:13px;"></div>

  <div class="field">
    <label for="exp-description">Description</label>
    <input class="input" id="exp-description" type="text" placeholder="Groceries, dinner, gas…" autocomplete="off" />
  </div>

  <div style="display:flex;gap:8px;">
    <div class="field" style="flex:1;">
      <label for="exp-amount">Amount</label>
      <input class="input" id="exp-amount" type="number" inputmode="decimal" min="0" step="0.01" placeholder="0.00" />
    </div>
    <div class="field" style="width:100px;flex-shrink:0;">
      <label for="exp-currency">Currency</label>
      <select class="input" id="exp-currency" style="cursor:pointer;"></select>
    </div>
  </div>

  <div class="field">
    <label for="exp-date">Date <span style="font-size:11px;font-weight:400;color:var(--text-muted);">(required)</span></label>
    <input class="input" id="exp-date" type="date" required />
  </div>

  <div class="field">
    <label for="exp-paid-by">Paid by</label>
    <select class="input" id="exp-paid-by" style="cursor:pointer;"></select>
  </div>

  <div class="field" id="participant-group">
    <label>Who's splitting this?</label>
    <div id="participant-list" class="participant-list"></div>
  </div>

  <div class="field">
    <label>Split</label>
    <div class="toggle-group split-method-toggle" style="margin-top:6px;">
      <button type="button" class="toggle-btn active" data-method="equal">Equal</button>
      <button type="button" class="toggle-btn"        data-method="exact">Exact</button>
      <button type="button" class="toggle-btn"        data-method="percentage">%</button>
      <button type="button" class="toggle-btn"        data-method="shares">Shares</button>
      <button type="button" class="toggle-btn"        data-method="adjustment">Adjust</button>
      <button type="button" class="toggle-btn"        data-method="claim">Claim</button>
    </div>
  </div>

  <div id="split-inputs" style="margin-top:8px;margin-bottom:4px;"></div>

  <div class="field">
    <label>Category <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;">(optional)</span></label>
    <div class="toggle-group" id="exp-category-group" style="margin-top:6px;flex-wrap:wrap;">
      <button type="button" class="toggle-btn" data-category="food">Food &amp; Drink</button>
      <button type="button" class="toggle-btn" data-category="groceries">Groceries</button>
      <button type="button" class="toggle-btn" data-category="transport">Transport</button>
      <button type="button" class="toggle-btn" data-category="lodging">Lodging</button>
      <button type="button" class="toggle-btn" data-category="entertainment">Fun</button>
      <button type="button" class="toggle-btn" data-category="other">Other</button>
    </div>
  </div>

  <div class="field">
    <label for="exp-note">Note <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;">(optional)</span></label>
    <input class="input" id="exp-note" type="text" placeholder="Optional note…" autocomplete="off" />
  </div>

  <button class="btn btn-primary btn-full mt-16" id="save-expense-btn">Add Expense</button>
</div>

<!-- Settle-Up Sheet -->
<div class="sheet-backdrop" id="settle-backdrop" style="display:none;"></div>
<div class="sheet" id="settle-sheet" style="display:none;">
  <div class="sheet-handle"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <h2 style="margin:0;">Settle Up</h2>
    <button class="btn btn-ghost btn-sm" id="close-settle-btn">✕</button>
  </div>
  <p id="settle-description" style="font-size:15px;margin-bottom:16px;"></p>
  <div class="field">
    <label>How did you pay?</label>
    <div class="toggle-group" style="margin-top:6px;">
      <button class="toggle-btn active" data-settle-method="venmo">Venmo</button>
      <button class="toggle-btn" data-settle-method="cash">Cash</button>
      <button class="toggle-btn" data-settle-method="other">Other</button>
    </div>
  </div>
  <div id="venmo-settle-wrap" style="margin-top:12px;"></div>
  <div class="field" style="margin-top:12px;">
    <label for="settle-note">Note <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:11px;">(optional)</span></label>
    <input class="input" id="settle-note" type="text" placeholder="Optional note…" autocomplete="off" />
  </div>
  <button class="btn btn-primary btn-full mt-16" id="record-settle-btn">Mark as Settled</button>
</div>

<!-- Add Member Sheet -->
<div class="sheet-backdrop" id="add-member-backdrop" style="display:none;"></div>
<div class="sheet" id="add-member-sheet" style="display:none;">
  <div class="sheet-handle"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
    <h2 style="margin:0;">Add Member</h2>
    <button class="btn btn-ghost btn-sm" id="close-add-member-btn">✕</button>
  </div>
  <div class="field">
    <label for="member-name-input">Name</label>
    <input class="input" id="member-name-input" type="text" placeholder="Full name" autocomplete="off" />
  </div>
  <div class="field">
    <label for="member-phone-input">Phone</label>
    <input class="input" id="member-phone-input" type="tel" placeholder="(555) 555-5555" autocomplete="tel" />
  </div>
  <button class="btn btn-primary btn-full mt-16" id="save-member-btn">Add to Group</button>
</div>

<!-- Settings Sheet -->
<div class="sheet-backdrop" id="settings-backdrop" style="display:none;"></div>
<div class="sheet" id="settings-sheet" style="display:none;">
  <div class="sheet-handle"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
    <h2 style="margin:0;">Group Settings</h2>
    <button class="btn btn-ghost btn-sm" id="close-settings-btn">✕</button>
  </div>
  <button class="btn btn-secondary btn-full" id="toggle-close-btn" style="margin-bottom:12px;"></button>
  <button class="btn btn-full" id="delete-group-btn" style="background:var(--danger,#c0392b);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px;font-size:15px;font-weight:500;cursor:pointer;"></button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/utils.js"></script>
<script src="/js/user-search.js"></script>
<script src="/js/groups.js"></script>
<script src="/js/balance.js"></script>
<script>
  const user = Auth.requireAuth();
  if (!user) throw new Error('Not authenticated');

  let groupId = null;
  let group   = null;
  let members = [];
  let activeSplitMethod = 'equal';
  let balancesLoaded = false;
  let scannedItems    = [];   // items from OCR, used by Claim split method
  let claimsByUnit    = {};   // key: `${itemIdx}-${unitIdx}` → Set<phone>
  let claimActivePhone = null;

  // ── Init ──────────────────────────────────────────────────
  async function init() {
    const params = new URLSearchParams(window.location.search);
    groupId = params.get('id');
    const inviteToken = params.get('token');

    if (!groupId) { navigateTo('/dashboard.html'); return; }

    if (inviteToken) {
      const { error, alreadyMember } = await Groups.joinGroup(groupId, inviteToken, user.phone, user.name);
      if (error && !alreadyMember) {
        showToast('Invalid invite link', 'error');
        navigateTo('/dashboard.html');
        return;
      }
      window.history.replaceState({}, '', `/group.html?id=${groupId}`);
    }

    await loadGroup();
    subscribeRealtime();
  }

  // ── Realtime — keep the group live across members ──────────
  let realtimeTimer = null;
  function onGroupDataChange() {
    // Debounce bursts (e.g. expense + splits inserted together)
    clearTimeout(realtimeTimer);
    realtimeTimer = setTimeout(async () => {
      await loadExpenses();
      const balancesVisible = $('balances-tab').style.display !== 'none';
      if (balancesVisible) await loadBalances();
      else balancesLoaded = false; // force fresh load next time the tab opens
    }, 400);
  }

  async function onMembersChange() {
    const { data } = await Groups.getMembers(groupId);
    members = data || [];
    setText('group-meta', `${members.length} member${members.length !== 1 ? 's' : ''}`);
    renderMembers();
    onGroupDataChange();
  }

  function subscribeRealtime() {
    db.channel(`group-${groupId}`)
      .on('postgres_changes', { event: '*', schema: 'tab', table: 'expenses',      filter: `group_id=eq.${groupId}` }, onGroupDataChange)
      .on('postgres_changes', { event: '*', schema: 'tab', table: 'settlements',   filter: `group_id=eq.${groupId}` }, onGroupDataChange)
      .on('postgres_changes', { event: '*', schema: 'tab', table: 'bills',         filter: `group_id=eq.${groupId}` }, onGroupDataChange)
      .on('postgres_changes', { event: '*', schema: 'tab', table: 'group_members', filter: `group_id=eq.${groupId}` }, onMembersChange)
      .subscribe();
  }

  async function loadGroup() {
    try {
      const [{ data: g, error: e1 }, { data: m, error: e2 }] = await Promise.all([
        Groups.getGroup(groupId),
        Groups.getMembers(groupId),
      ]);

      if (e1 || !g) {
        const msg = e1?.message || e1?.code || 'no data returned';
        console.error('loadGroup: getGroup failed —', msg, e1);
        setHTML('group-name', 'Could not load group');
        setText('group-meta', msg);
        return;
      }

      group   = g;
      members = m || [];

      document.title = `Tab — ${g.name}`;
      setText('group-name', g.name);
      setText('group-meta', `${members.length} member${members.length !== 1 ? 's' : ''}`);

      if (g.created_by === user.phone) {
        show($('settings-btn'));
        $('toggle-close-btn').textContent = g.closed_at ? 'Reopen Group' : 'Finalize Group';
        $('delete-group-btn').textContent = 'Delete Group';
      }

      renderMembers();
      await loadExpenses();

      if (g.closed_at) {
        show($('closed-banner'));
        $('add-expense-btn').disabled = true;
        $('add-expense-btn').textContent = 'Group Finalized';
        switchTab('balances');
        await loadBalances();
        showingSimplified = true;
        $('simplify-btn').textContent = 'Show All';
        $('balances-list').style.display = 'none';
        $('simplified-list').style.display = '';
        renderSimplified(Balance.simplify(window._lastBalances || []));
      }
    } catch (err) {
      console.error('loadGroup threw:', err);
      setHTML('group-name', 'Error loading group');
      setText('group-meta', err.message || String(err));
    }
  }

  // ── Tab navigation ────────────────────────────────────────
  $('tab-expenses').addEventListener('click', () => switchTab('expenses'));
  $('tab-balances').addEventListener('click', () => switchTab('balances'));
  $('tab-members').addEventListener('click',  () => switchTab('members'));

  function switchTab(tab) {
    $('expenses-tab').style.display  = tab === 'expenses' ? '' : 'none';
    $('balances-tab').style.display  = tab === 'balances' ? '' : 'none';
    $('members-tab').style.display   = tab === 'members'  ? '' : 'none';
    $('tab-expenses').classList.toggle('active', tab === 'expenses');
    $('tab-balances').classList.toggle('active', tab === 'balances');
    $('tab-members').classList.toggle('active', tab === 'members');
    if (tab === 'balances' && !balancesLoaded) loadBalances();
  }

  // ── Members tab ───────────────────────────────────────────
  function renderMembers() {
    if (members.length === 0) {
      setHTML('members-list', '<p style="font-size:14px;color:var(--text-muted);">No members yet.</p>');
      return;
    }
    setHTML('members-list', members.map((m, i) => `
      <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);">
        <div style="
          width:36px;height:36px;border-radius:50%;flex-shrink:0;
          display:flex;align-items:center;justify-content:center;
          font-size:13px;font-weight:600;
          background:${getPersonColor(i)}22;color:${getPersonColor(i)};
          border:1.5px solid ${getPersonColor(i)}44;">
          ${escHtml(getInitials(m.display_name))}
        </div>
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:500;">${escHtml(m.display_name)}${m.phone === user.phone ? ' <span style="font-size:11px;color:var(--text-muted);">(you)</span>' : ''}</div>
          <div style="font-size:12px;color:var(--text-muted);">Joined ${formatDateShort(m.joined_at)}</div>
        </div>
      </div>
    `).join(''));
  }

  // ── Invite ────────────────────────────────────────────────
  async function shareInvite() {
    if (!group) return;
    const url  = `${window.location.origin}/group.html?id=${encodeURIComponent(groupId)}&token=${encodeURIComponent(group.invite_token)}`;
    const text = `Join "${group.name}" on TAB: ${url}`;
    if (navigator.share) {
      try { await navigator.share({ title: `Join ${group.name}`, text, url }); }
      catch (e) { if (e.name !== 'AbortError') copyToClipboard(url); }
    } else {
      copyToClipboard(url);
    }
  }

  $('invite-btn').addEventListener('click', shareInvite);
  $('invite-members-btn').addEventListener('click', shareInvite);
  $('back-btn').addEventListener('click', () => navigateTo('/dashboard.html#groups'));

  // ── Balances tab ──────────────────────────────────────────
  async function loadBalances() {
    setHTML('balances-list', '<p style="font-size:14px;color:var(--text-muted);">Computing balances…</p>');
    try {
      const [
        { data: expenses,    error: e1 },
        { data: bills,       error: e2 },
        { data: settlements, error: e3 },
      ] = await Promise.all([
        Groups.getExpenses(groupId),
        Groups.getBillsForGroup(groupId),
        Groups.getSettlements(groupId),
      ]);

      if (e1 || e2 || e3) {
        console.error('loadBalances errors — expenses:', e1, '| bills:', e2, '| settlements:', e3);
        const msg = (e1 || e2 || e3)?.message || (e1 || e2 || e3)?.code || 'unknown';
        setHTML('balances-list', `<p style="font-size:14px;color:var(--text-muted);">Could not load balances: ${escHtml(msg)}</p>`);
        return;
      }

      const allExpenses    = expenses    || [];
      const allBills       = bills       || [];
      const allSettlements = settlements || [];

      const currencies = [
        ...allExpenses.map(e => e.currency),
        ...allBills.map(b => b.currency),
        ...allSettlements.map(s => s.currency),
      ];

      const memberPhones = new Set(members.map(m => m.phone));
      const adjustedBills = allBills.map(bill => {
        const filteredShares = (bill.memberShares || []).filter(s => memberPhones.has(s.phone));
        const groupTotal     = filteredShares.reduce((s, x) => s + x.amount, 0);
        return { ...bill, grand_total: groupTotal, memberShares: filteredShares };
      });

      const rates    = await Balance.fetchRates(currencies);
      const rawNet   = Balance.computeRaw(allExpenses, adjustedBills, members, allSettlements);
      const byMember = Balance.toUSD(rawNet, members, rates);

      window._lastBalances = byMember;

      renderBalances(byMember);
      balancesLoaded = true;
    } catch (err) {
      console.error('loadBalances failed:', err);
      setHTML('balances-list', '<p style="font-size:14px;color:var(--text-muted);">Could not load balances.</p>');
    }
  }

  function renderBalances(byMember) {
    if (!byMember.some(m => m.partial) && byMember.every(m => Math.abs(m.usdNet) < 0.01)) {
      setHTML('balances-list', `
        <div class="empty">
          <div class="empty-icon">✓</div>
          <h3>All settled up</h3>
          <p>No one owes anyone in this group.</p>
        </div>
      `);
      return;
    }

    setHTML('balances-list', byMember.map((m, i) => {
      const isYou   = m.phone === user.phone;
      const net     = m.usdNet;
      const absNet  = Math.abs(net);
      const color   = net > 0.01 ? 'var(--green)' : net < -0.01 ? 'var(--red)' : 'var(--text-muted)';
      const label   = net > 0.01
        ? (isYou ? 'You are owed' : 'Is owed')
        : net < -0.01
        ? (isYou ? 'You owe' : 'Owes')
        : 'Settled up';

      const breakdown = m.breakdown.length > 1
        ? `<details style="margin-top:6px;">
            <summary style="font-size:12px;color:var(--text-muted);cursor:pointer;">Per currency</summary>
            <div style="padding:6px 0 0 0;">
              ${m.breakdown.map(b => `
                <div style="font-size:12px;color:var(--text-muted);display:flex;justify-content:space-between;padding:2px 0;">
                  <span>${b.currency}</span>
                  <span>${b.amount >= 0 ? '+' : ''}${fmtCurrency(b.amount, b.currency)}
                    ${b.rateAvailable ? `<span style="color:var(--text-muted);"> ≈ ${fmtCurrency(b.usdAmount, 'USD')}</span>` : '<span style="color:var(--red);"> (rate unavailable)</span>'}
                  </span>
                </div>
              `).join('')}
            </div>
          </details>`
        : '';

      return `
        <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);">
          <div style="width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;background:${getPersonColor(i)}22;color:${getPersonColor(i)};border:1.5px solid ${getPersonColor(i)}44;">
            ${escHtml(getInitials(m.display_name))}
          </div>
          <div style="flex:1;">
            <div style="font-size:14px;font-weight:500;">${escHtml(m.display_name)}${isYou ? ' <span style="font-size:11px;color:var(--text-muted);">(you)</span>' : ''}</div>
            <div style="font-size:12px;color:${color};margin-top:2px;">${label}</div>
            ${breakdown}
          </div>
          <div style="font-size:16px;font-weight:600;color:${color};">${absNet < 0.01 ? '—' : fmtCurrency(absNet, 'USD')}${m.partial ? '<span style="font-size:10px;color:var(--text-muted);margin-left:2px;">~</span>' : ''}</div>
        </div>
      `;
    }).join(''));
  }

  // ── Expenses tab ──────────────────────────────────────────
  async function loadExpenses() {
    try {
      const [expResult, billResult] = await Promise.all([
        Groups.getExpenses(groupId),
        Groups.getBillsForGroup(groupId),
      ]);
      if (expResult.error) {
        console.error('loadExpenses failed:', expResult.error);
        const msg = expResult.error?.message || expResult.error?.code || 'unknown';
        setHTML('expenses-list', `<p style="font-size:14px;color:var(--text-muted);">Could not load expenses: ${escHtml(msg)}</p>`);
        return;
      }
      renderExpenses(expResult.data || [], billResult.data || []);
    } catch (err) {
      console.error('loadExpenses threw:', err);
      setHTML('expenses-list', '<p style="font-size:14px;color:var(--text-muted);">Could not load expenses.</p>');
    }
  }

  let expensesCache = [];

  function renderExpenses(expenses, bills = []) {
    expensesCache = expenses;
    // Merge expenses and bills, sorted newest first
    const expItems  = expenses.map(e => ({ ...e, _type: 'expense', _date: e.expense_date || e.created_at }));
    const billItems = bills.map(b => ({ ...b, _type: 'bill', _date: b.created_at }));
    const combined  = [...expItems, ...billItems].sort((a, b) => new Date(b._date) - new Date(a._date));

    if (combined.length === 0) {
      setHTML('expenses-list', `
        <div class="empty">
          <div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="20" height="12" x="2" y="6" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></svg></div>
          <h3>No expenses yet</h3>
          <p>Add an expense to start tracking who owes what.</p>
        </div>
      `);
      return;
    }
    setHTML('expenses-list', combined.map(item =>
      item._type === 'bill' ? renderBillCard(item) : renderExpenseCard(item)
    ).join(''));

    // Wire edit/delete buttons on expense cards
    $$('.expense-edit-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const exp = expensesCache.find(x => x.id === btn.dataset.expenseId);
        if (exp) openEditExpense(exp);
      });
    });
    $$('.expense-delete-btn').forEach(btn => {
      btn.addEventListener('click', async e => {
        e.stopPropagation();
        const exp = expensesCache.find(x => x.id === btn.dataset.expenseId);
        if (!exp) return;
        if (!confirm(`Delete "${exp.description}" (${fmtCurrency(exp.amount, exp.currency)})?\n\nThis removes it from everyone's balances.`)) return;
        const { error } = await Groups.deleteExpense(exp.id);
        if (error) return showToast('Could not delete expense', 'error');
        balancesLoaded = false;
        await loadExpenses();
        showToast('Expense deleted', 'success');
      });
    });

    // Wire unlink buttons
    $$('.unlink-bill-btn').forEach(btn => {
      btn.addEventListener('click', async e => {
        e.stopPropagation();
        if (!confirm('Remove this bill from the group? It will move back to your Bills tab.')) return;
        const bId = btn.dataset.billId;
        const { error } = await Groups.assignBillToGroup(bId, null);
        if (error) return showToast('Could not unlink bill', 'error');
        balancesLoaded = false;
        await loadExpenses();
        showToast('Bill moved back to Bills tab', 'success');
      });
    });
  }

  function renderBillCard(bill) {
    const payer     = members.find(m => m.phone === (bill.paid_by_phone || bill.created_by_phone));
    const payerName = payer ? payer.display_name : 'Unknown';
    const myShare   = (bill.memberShares || []).find(s => s.phone === user.phone);
    const myAmt     = myShare ? fmtCurrency(myShare.amount, bill.currency || 'USD') : null;
    const iAmPayer  = (bill.paid_by_phone || bill.created_by_phone) === user.phone;
    const canUnlink = bill.created_by_phone === user.phone;
    const participants = Array.isArray(bill.group_participants) && bill.group_participants.length > 0
      ? bill.group_participants.length
      : (bill.memberShares || []).length;

    return `
      <div class="bill-card fade-up" style="cursor:pointer;" onclick="navigateTo('/bill/${escHtml(bill.id)}')">
        <div class="bill-card-top">
          <div class="bill-card-name" style="display:flex;align-items:center;gap:8px;">
            ${escHtml(bill.name)}
            <span class="badge badge-setup" style="font-size:10px;flex-shrink:0;">Bill</span>
          </div>
          <span style="font-size:14px;font-weight:600;color:var(--accent);">${fmtCurrency(bill.grand_total || 0, bill.currency || 'USD')}</span>
        </div>
        <div class="bill-card-meta">
          <span>${escHtml(payerName)} paid</span>
          <span>${participants} participant${participants !== 1 ? 's' : ''}</span>
          <span>${formatDateShort(bill.created_at)}</span>
        </div>
        ${myAmt ? `
        <div class="bill-card-footer">
          <span class="bill-card-yours">
            ${iAmPayer ? "You paid · you're owed back" : `Your share: ${myAmt}`}
          </span>
          ${canUnlink ? `<button class="btn btn-ghost btn-sm unlink-bill-btn" data-bill-id="${escHtml(bill.id)}" style="font-size:11px;padding:2px 8px;">Unlink</button>` : ''}
        </div>` : canUnlink ? `
        <div class="bill-card-footer" style="justify-content:flex-end;">
          <button class="btn btn-ghost btn-sm unlink-bill-btn" data-bill-id="${escHtml(bill.id)}" style="font-size:11px;padding:2px 8px;">Unlink</button>
        </div>` : ''}
      </div>
    `;
  }

  function renderExpenseCard(exp) {
    const payer     = members.find(m => m.phone === exp.paid_by);
    const payerName = payer ? payer.display_name : exp.paid_by;
    const mySplit   = (exp.splits || []).find(s => s.phone === user.phone);
    const myAmt     = mySplit ? fmtCurrency(mySplit.amount, exp.currency) : null;
    const iAmPayer  = exp.paid_by === user.phone;
    const canManage = (iAmPayer || group?.created_by === user.phone) && !group?.closed_at;

    const splitLabel = exp.split_method === 'equal'      ? 'Equal split'
                     : exp.split_method === 'percentage'  ? 'By percentage'
                     : exp.split_method === 'exact'       ? 'Exact amounts'
                     : exp.split_method === 'shares'      ? 'By shares'
                     : exp.split_method === 'adjustment'  ? 'By adjustment'
                     : exp.split_method;

    const manageBtns = canManage ? `
      <span style="display:flex;gap:4px;flex-shrink:0;">
        <button class="btn btn-ghost btn-sm expense-edit-btn" data-expense-id="${escHtml(exp.id)}" style="font-size:11px;padding:2px 8px;">Edit</button>
        <button class="btn btn-ghost btn-sm expense-delete-btn" data-expense-id="${escHtml(exp.id)}" style="font-size:11px;padding:2px 8px;color:var(--red,#c0392b);">Delete</button>
      </span>` : '';

    return `
      <div class="bill-card fade-up" style="cursor:default;">
        <div class="bill-card-top">
          <div class="bill-card-name">${escHtml(exp.description)}</div>
          <span style="font-size:14px;font-weight:600;color:var(--accent);">${fmtCurrency(exp.amount, exp.currency)}</span>
        </div>
        <div class="bill-card-meta">
          <span>${escHtml(payerName)} paid</span>
          <span>${splitLabel}</span>
          <span>${formatDateShort(exp.expense_date || exp.created_at)}</span>
          ${exp.category ? `<span style="color:var(--accent);font-weight:500;">${escHtml(CATEGORY_LABELS[exp.category] || exp.category)}</span>` : ''}
        </div>
        ${(myAmt || manageBtns) ? `
        <div class="bill-card-footer" style="align-items:center;">
          <span class="bill-card-yours" style="flex:1;">
            ${myAmt ? (iAmPayer ? "You paid · you're owed back" : `Your share: ${myAmt}`) : ''}
          </span>
          ${manageBtns}
        </div>` : ''}
      </div>
    `;
  }

  // ── Add Expense Sheet ─────────────────────────────────────
  function getIncludedMembers() {
    const checked = [...$$('#participant-list .participant-cb')]
      .filter(cb => cb.checked)
      .map(cb => cb.dataset.phone);
    // Return full member objects in original members order (for color/index consistency)
    return members.filter(m => checked.includes(m.phone));
  }

  function renderParticipants() {
    const list   = $('participant-list');
    const paidBy = $('exp-paid-by').value;
    list.innerHTML = members.map(m => {
      const isPayer = m.phone === paidBy;
      return `
        <label class="participant-row">
          <input type="checkbox" class="participant-cb" data-phone="${escHtml(m.phone)}"
            ${isPayer ? 'checked disabled' : 'checked'}>
          <span class="participant-name">${escHtml(m.display_name)}</span>
          <span class="participant-phone">${escHtml(Auth.formatPhone(m.phone))}</span>
        </label>`;
    }).join('');
  }

  $('participant-list').addEventListener('change', e => {
    if (!e.target.classList.contains('participant-cb')) return;
    const checked = $$('#participant-list .participant-cb:checked');
    if (checked.length === 0) {
      e.target.checked = true; // prevent unchecking the last person
      return;
    }
    renderSplitInputs();
  });

  function populateCurrencySelect() {
    $('exp-currency').innerHTML = CURRENCIES.map(c =>
      `<option value="${c.code}"${c.code === 'USD' ? ' selected' : ''}>${c.code}</option>`
    ).join('');
  }

  function populatePaidBySelect() {
    $('exp-paid-by').innerHTML = members.map(m =>
      `<option value="${m.phone}"${m.phone === user.phone ? ' selected' : ''}>${escHtml(m.display_name)}</option>`
    ).join('');
  }

  function renderSplitInputs() {
    const method   = activeSplitMethod;
    const amount   = parseFloat($('exp-amount').value) || 0;
    const currency = $('exp-currency').value || 'USD';
    const included = getIncludedMembers();
    const n        = included.length;

    if (n === 0) { setHTML('split-inputs', ''); return; }

    if (method === 'equal') {
      const each = n > 0 ? (amount / n) : 0;
      setHTML('split-inputs', `
        <p style="font-size:13px;color:var(--text-muted);padding:4px 0;">
          ${fmtCurrency(each.toFixed(2), currency)} per person · ${n} member${n !== 1 ? 's' : ''}
        </p>
      `);
      return;
    }

    if (method === 'percentage') {
      const even      = n > 0 ? Math.floor(100 / n) : 0;
      const remainder = 100 - (even * n);
      setHTML('split-inputs', included.map((m, localIdx) => {
        const colorIdx = members.indexOf(m);
        return `
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <div style="width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:${getPersonColor(colorIdx)}22;color:${getPersonColor(colorIdx)};border:1.5px solid ${getPersonColor(colorIdx)}44;">
              ${escHtml(getInitials(m.display_name))}
            </div>
            <span style="flex:1;font-size:14px;">${escHtml(m.display_name)}</span>
            <input class="input split-pct-input" data-phone="${escHtml(m.phone)}" type="number" min="0" max="100" step="1"
              value="${even + (localIdx === 0 ? remainder : 0)}"
              style="width:68px;padding:6px 8px;text-align:right;font-size:14px;" />
            <span style="font-size:13px;color:var(--text-muted);">%</span>
          </div>`;
      }).join('') + `<p id="pct-sum-note" style="font-size:12px;color:var(--text-muted);margin-top:2px;"></p>`);
      $$('.split-pct-input').forEach(el => el.addEventListener('input', updatePctNote));
      updatePctNote();
      return;
    }

    if (method === 'exact') {
      const each = n > 0 ? (amount / n).toFixed(2) : '0.00';
      setHTML('split-inputs', included.map(m => {
        const colorIdx = members.indexOf(m);
        return `
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <div style="width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:${getPersonColor(colorIdx)}22;color:${getPersonColor(colorIdx)};border:1.5px solid ${getPersonColor(colorIdx)}44;">
              ${escHtml(getInitials(m.display_name))}
            </div>
            <span style="flex:1;font-size:14px;">${escHtml(m.display_name)}</span>
            <input class="input split-exact-input" data-phone="${escHtml(m.phone)}" type="number" inputmode="decimal" min="0" step="0.01"
              value="${each}"
              style="width:90px;padding:6px 8px;text-align:right;font-size:14px;" />
          </div>`;
      }).join('') + `<p id="exact-sum-note" style="font-size:12px;color:var(--text-muted);margin-top:2px;"></p>`);
      $$('.split-exact-input').forEach(el => el.addEventListener('input', updateExactNote));
      updateExactNote();
      return;
    }

    if (method === 'shares') {
      setHTML('split-inputs', included.map(m => {
        const colorIdx = members.indexOf(m);
        return `
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <div style="width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:${getPersonColor(colorIdx)}22;color:${getPersonColor(colorIdx)};border:1.5px solid ${getPersonColor(colorIdx)}44;">
              ${escHtml(getInitials(m.display_name))}
            </div>
            <span style="flex:1;font-size:14px;">${escHtml(m.display_name)}</span>
            <input class="input split-shares-input" data-phone="${escHtml(m.phone)}"
              type="number" inputmode="decimal" min="0.5" step="0.5" value="1"
              style="width:68px;padding:6px 8px;text-align:right;font-size:14px;" />
            <span style="font-size:13px;color:var(--text-muted);">shares</span>
            <span class="split-computed" id="shares-amt-${escHtml(m.phone)}"
              style="width:72px;text-align:right;font-size:13px;color:var(--text-muted);"></span>
          </div>`;
      }).join('') + `<p id="shares-sum-note" style="font-size:12px;color:var(--text-muted);margin-top:2px;"></p>`);
      $$('.split-shares-input').forEach(el => el.addEventListener('input', updateSharesAmounts));
      updateSharesAmounts();
      return;
    }

    if (method === 'claim') {
      renderClaimInputs();
      return;
    }

    if (method === 'adjustment') {
      setHTML('split-inputs', included.map(m => {
        const colorIdx = members.indexOf(m);
        return `
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
            <div style="width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;background:${getPersonColor(colorIdx)}22;color:${getPersonColor(colorIdx)};border:1.5px solid ${getPersonColor(colorIdx)}44;">
              ${escHtml(getInitials(m.display_name))}
            </div>
            <span style="flex:1;font-size:14px;">${escHtml(m.display_name)}</span>
            <span style="font-size:13px;color:var(--text-muted);margin-right:2px;">±</span>
            <input class="input split-adj-input" data-phone="${escHtml(m.phone)}"
              type="number" inputmode="decimal" step="0.01" placeholder="0.00"
              style="width:80px;padding:6px 8px;text-align:right;font-size:14px;" />
            <span class="split-computed" id="adj-amt-${escHtml(m.phone)}"
              style="width:72px;text-align:right;font-size:13px;color:var(--text-muted);"></span>
          </div>`;
      }).join('') + `<p id="adj-note" style="font-size:12px;margin-top:2px;"></p>`);
      $$('.split-adj-input').forEach(el => el.addEventListener('input', updateAdjAmounts));
      updateAdjAmounts();
      return;
    }
  }

  function updatePctNote() {
    const total = $$('.split-pct-input').reduce((s, el) => s + (parseFloat(el.value) || 0), 0);
    const note  = $('pct-sum-note');
    if (!note) return;
    const diff  = Math.abs(total - 100);
    note.textContent = diff < 0.01 ? '✓ Adds up to 100%' : `Total: ${total.toFixed(0)}% (must equal 100%)`;
    note.style.color = diff < 0.01 ? 'var(--green)' : 'var(--red)';
  }

  function updateExactNote() {
    const amount   = parseFloat($('exp-amount').value) || 0;
    const currency = $('exp-currency').value || 'USD';
    const total    = [...$$('.split-exact-input')].reduce((s, el) => s + (parseFloat(el.value) || 0), 0);
    const note     = $('exact-sum-note');
    if (!note) return;
    const diff = total - amount;
    if (Math.abs(diff) < 0.01) {
      note.textContent = `✓ Adds up to ${fmtCurrency(amount, currency)}`;
      note.style.color = 'var(--green)';
    } else {
      const direction = diff > 0 ? 'over' : 'under';
      const absDiff   = fmtCurrency(Math.abs(diff).toFixed(2), currency);
      note.textContent = `Total: ${fmtCurrency(total, currency)} (must equal ${fmtCurrency(amount, currency)} — ${absDiff} ${direction})`;
      note.style.color = 'var(--red, #e74c3c)';
    }
  }

  function updateSharesAmounts() {
    const amount      = parseFloat($('exp-amount').value) || 0;
    const currency    = $('exp-currency').value || 'USD';
    const inputs      = [...$$('.split-shares-input')];
    const totalShares = inputs.reduce((s, el) => s + (parseFloat(el.value) || 0), 0);
    inputs.forEach(el => {
      const share = totalShares > 0 ? ((parseFloat(el.value) || 0) / totalShares) * amount : 0;
      const amtEl = $(`shares-amt-${el.dataset.phone}`);
      if (amtEl) amtEl.textContent = fmtCurrency(share.toFixed(2), currency);
    });
    const note = $('shares-sum-note');
    if (note) {
      note.textContent = totalShares > 0
        ? `${totalShares} total share${totalShares !== 1 ? 's' : ''}`
        : 'Enter shares above';
      note.style.color = 'var(--text-muted)';
    }
  }

  function updateAdjAmounts() {
    const amount   = parseFloat($('exp-amount').value) || 0;
    const currency = $('exp-currency').value || 'USD';
    const inputs   = [...$$('.split-adj-input')];
    const n        = inputs.length;
    const totalAdj = inputs.reduce((s, el) => s + (parseFloat(el.value) || 0), 0);
    const remainder = amount - totalAdj;
    const baseEach  = n > 0 ? remainder / n : 0;
    const note      = $('adj-note');

    if (totalAdj > amount + 0.005) {
      if (note) {
        note.textContent = `Adjustments exceed total by ${fmtCurrency((totalAdj - amount).toFixed(2), currency)} — reduce adjustments`;
        note.style.color = 'var(--red, #e74c3c)';
      }
      inputs.forEach(el => {
        const amtEl = $(`adj-amt-${el.dataset.phone}`);
        if (amtEl) amtEl.textContent = '—';
      });
      return;
    }

    inputs.forEach(el => {
      const adj   = parseFloat(el.value) || 0;
      const total = parseFloat((baseEach + adj).toFixed(2));
      const amtEl = $(`adj-amt-${el.dataset.phone}`);
      if (amtEl) amtEl.textContent = fmtCurrency(total, currency);
    });

    if (note) {
      note.textContent = `Base: ${fmtCurrency(baseEach.toFixed(2), currency)} each`;
      note.style.color = 'var(--text-muted)';
    }
  }

  function renderClaimInputs() {
    const currency = $('exp-currency').value || 'USD';

    if (scannedItems.length === 0) {
      setHTML('split-inputs', '<p style="font-size:13px;color:var(--text-muted);padding:4px 0;">Scan a receipt first to use item claiming — tap Scan above.</p>');
      return;
    }

    const pickerHtml = `
      <div style="margin-bottom:12px;">
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);margin-bottom:6px;">Claiming for</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          ${members.map((m, colorIdx) => {
            const isActive = m.phone === claimActivePhone;
            const color    = getPersonColor(colorIdx);
            return `
              <button type="button" class="claim-member-btn"
                data-phone="${escHtml(m.phone)}"
                style="display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;
                       border:2px solid ${isActive ? color : 'var(--border)'};
                       background:${isActive ? color + '22' : 'transparent'};
                       cursor:pointer;font-size:13px;color:var(--text);">
                <div style="width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;
                            font-size:9px;font-weight:600;background:${color}22;color:${color};">
                  ${escHtml(getInitials(m.display_name))}
                </div>
                ${escHtml(m.display_name.split(' ')[0])}
              </button>`;
          }).join('')}
        </div>
      </div>`;

    const itemsHtml = scannedItems.map((item, itemIdx) => {
      const qty = parseInt(item.quantity) || 1;
      const chips = Array.from({ length: qty }, (_, unitIdx) => {
        const key      = `${itemIdx}-${unitIdx}`;
        const claimers = claimsByUnit[key] ? [...claimsByUnit[key]] : [];
        const isEmpty  = claimers.length === 0;
        const avatars  = claimers.map(phone => {
          const mIdx  = members.findIndex(m => m.phone === phone);
          const color = getPersonColor(mIdx >= 0 ? mIdx : 0);
          const m     = members[mIdx];
          return `<div style="width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:600;background:${color}33;color:${color};border:1px solid ${color};">${escHtml(getInitials(m ? m.display_name : '?'))}</div>`;
        }).join('');
        const splitLabel = claimers.length > 1 ? `<span style="font-size:9px;color:var(--text-muted);margin-left:1px;">÷${claimers.length}</span>` : '';
        return `
          <button type="button"
            style="display:inline-flex;align-items:center;justify-content:center;gap:1px;min-width:30px;height:30px;padding:0 4px;border-radius:6px;cursor:pointer;
                   border:${isEmpty ? '1.5px dashed var(--border)' : '1.5px solid var(--border-strong)'};
                   background:${isEmpty ? 'transparent' : 'var(--surface-2)'};"
            onclick="toggleExpenseClaim(${itemIdx},${unitIdx})">
            ${isEmpty ? '<span style="color:var(--border-strong);font-size:14px;">+</span>' : `<div style="display:flex;gap:1px;">${avatars}</div>${splitLabel}`}
          </button>`;
      }).join('');

      return `
        <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);">
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(item.name)}</div>
            <div style="font-size:11px;color:var(--text-muted);">${fmtCurrency(item.price, currency)} each</div>
          </div>
          <div style="display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end;">${chips}</div>
        </div>`;
    }).join('');

    const splits   = computeClaimSplits();
    const amount   = parseFloat($('exp-amount').value) || 0;
    const claimedTotal = splits.reduce((s, x) => s + x.amount, 0);
    const previewHtml = splits.length > 0
      ? `<div style="margin-top:10px;padding:8px;background:var(--surface-2);border-radius:var(--radius-sm);">
          ${splits.map(s => {
            const m = members.find(x => x.phone === s.phone);
            return `<div style="display:flex;justify-content:space-between;font-size:13px;padding:2px 0;">
              <span>${escHtml(m ? m.display_name : s.phone)}</span>
              <span style="font-weight:500;">${fmtCurrency(s.amount, currency)}</span>
            </div>`;
          }).join('')}
          <div style="font-size:11px;margin-top:4px;color:${Math.abs(claimedTotal - amount) < 0.02 ? 'var(--green)' : 'var(--text-muted)'};">
            ${Math.abs(claimedTotal - amount) < 0.02 ? `✓ ${fmtCurrency(amount, currency)} total` : `${fmtCurrency(claimedTotal, currency)} of ${fmtCurrency(amount, currency)} claimed`}
          </div>
        </div>`
      : `<p style="font-size:12px;color:var(--text-muted);margin-top:8px;">Tap items above to assign them.</p>`;

    setHTML('split-inputs', pickerHtml + `<div style="margin-bottom:4px;">${itemsHtml}</div>` + previewHtml);

    $$('.claim-member-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        claimActivePhone = btn.dataset.phone;
        renderSplitInputs();
      });
    });
  }

  function computeClaimSplits() {
    const amount        = parseFloat($('exp-amount').value) || 0;
    const itemsSubtotal = scannedItems.reduce((s, it) => s + (parseFloat(it.price) || 0) * (parseInt(it.quantity) || 1), 0);
    const tax           = Math.max(0, amount - itemsSubtotal);

    const memberTotals  = {};
    members.forEach(m => { memberTotals[m.phone] = 0; });

    scannedItems.forEach((item, itemIdx) => {
      const qty = parseInt(item.quantity) || 1;
      for (let unitIdx = 0; unitIdx < qty; unitIdx++) {
        const key      = `${itemIdx}-${unitIdx}`;
        const claimers = claimsByUnit[key] ? [...claimsByUnit[key]] : [];
        if (!claimers.length) continue;
        const price = parseFloat(item.price) || 0;
        claimers.forEach(phone => {
          if (memberTotals[phone] !== undefined) memberTotals[phone] += price / claimers.length;
        });
      }
    });

    const totalClaimed = Object.values(memberTotals).reduce((s, v) => s + v, 0);
    if (totalClaimed < 0.001) return [];

    const splits = members
      .filter(m => memberTotals[m.phone] > 0.001)
      .map(m => {
        const itemShare = memberTotals[m.phone];
        const taxShare  = totalClaimed > 0 ? tax * (itemShare / totalClaimed) : 0;
        return { phone: m.phone, amount: parseFloat((itemShare + taxShare).toFixed(2)) };
      });

    // Reconcile rounding to payer
    const sum     = splits.reduce((s, x) => s + x.amount, 0);
    const target  = parseFloat((totalClaimed + tax).toFixed(2));
    const diff    = parseFloat((target - sum).toFixed(2));
    if (Math.abs(diff) > 0 && splits.length > 0) {
      const paid_by   = $('exp-paid-by').value;
      const payerSplit = splits.find(s => s.phone === paid_by) || splits[0];
      if (payerSplit) payerSplit.amount = parseFloat((payerSplit.amount + diff).toFixed(2));
    }

    return splits;
  }

  window.toggleExpenseClaim = function(itemIdx, unitIdx) {
    if (!claimActivePhone) { showToast('Select a person first', 'error'); return; }
    const key = `${itemIdx}-${unitIdx}`;
    if (!claimsByUnit[key]) claimsByUnit[key] = new Set();
    const set = claimsByUnit[key];
    if (set.has(claimActivePhone)) {
      set.delete(claimActivePhone);
      if (set.size === 0) delete claimsByUnit[key];
    } else {
      set.add(claimActivePhone);
    }
    renderSplitInputs();
  };

    // Equal splits stay equal; everything else loads as exact amounts (preserves data, easy to tweak)

  $('save-expense-btn').addEventListener('click', async () => {
    const description = $('exp-description').value.trim();
    const amount      = parseFloat($('exp-amount').value);
    const currency    = $('exp-currency').value;
    const paid_by     = $('exp-paid-by').value;
    const note         = $('exp-note').value.trim() || null;
    const expense_date = $('exp-date').value;

    if (!description) { showToast('Enter a description', 'error'); return; }
    if (!amount || amount <= 0) { showToast('Enter a valid amount', 'error'); return; }
    if (!paid_by) { showToast('Select who paid', 'error'); return; }
    if (!expense_date) { showToast('Date is required', 'error'); return; }
    if (members.length === 0) { showToast('No members to split with', 'error'); return; }

    const includedAtSave = getIncludedMembers();
    if (activeSplitMethod !== 'claim' && !includedAtSave.some(m => m.phone === paid_by)) {
      showToast('Payer must be included in the split', 'error');
      return;
    }

    let splits = [];

    if (activeSplitMethod === 'equal') {
      const included  = includedAtSave;
      const n         = included.length;
      const baseShare = Math.floor((amount / n) * 100) / 100;
      splits = included.map(m => ({ phone: m.phone, amount: baseShare }));
      const sum  = splits.reduce((s, x) => s + x.amount, 0);
      const diff = parseFloat((amount - sum).toFixed(2));
      if (Math.abs(diff) > 0) {
        const payerSplit = splits.find(s => s.phone === paid_by) || splits[0];
        if (payerSplit) payerSplit.amount = parseFloat((payerSplit.amount + diff).toFixed(2));
      }

    } else if (activeSplitMethod === 'percentage') {
      const inputs   = $$('.split-pct-input');
      const totalPct = inputs.reduce((s, el) => s + (parseFloat(el.value) || 0), 0);
      if (Math.abs(totalPct - 100) > 0.01) { showToast('Percentages must sum to 100%', 'error'); return; }
      splits = inputs.map(el => ({
        phone:  el.dataset.phone,
        amount: parseFloat((amount * (parseFloat(el.value) || 0) / 100).toFixed(2)),
      }));
      // Reconcile rounding: assign remainder to payer
      const pctSum  = splits.reduce((s, x) => s + x.amount, 0);
      const pctDiff = parseFloat((amount - pctSum).toFixed(2));
      if (Math.abs(pctDiff) > 0) {
        const payerSplit = splits.find(s => s.phone === paid_by) || splits[0];
        if (payerSplit) payerSplit.amount = parseFloat((payerSplit.amount + pctDiff).toFixed(2));
      }

    } else if (activeSplitMethod === 'exact') {
      const inputs     = $$('.split-exact-input');
      const totalExact = inputs.reduce((s, el) => s + (parseFloat(el.value) || 0), 0);
      if (Math.abs(totalExact - amount) > 0.01) {
        const diff      = totalExact - amount;
        const direction = diff > 0 ? 'over' : 'under';
        const absDiff   = fmtCurrency(Math.abs(diff).toFixed(2), currency);
        showToast(`Amounts must equal ${fmtCurrency(amount, currency)} — ${absDiff} ${direction}`, 'error');
        return;
      }
      splits = inputs.map(el => ({
        phone:  el.dataset.phone,
        amount: parseFloat(parseFloat(el.value || 0).toFixed(2)),
      }));
    } else if (activeSplitMethod === 'shares') {
      const inputs      = [...$$('.split-shares-input')];
      const totalShares = inputs.reduce((s, el) => s + (parseFloat(el.value) || 0), 0);
      if (totalShares <= 0) { showToast('Enter shares for each person', 'error'); return; }
      splits = inputs.map(el => ({
        phone:  el.dataset.phone,
        amount: parseFloat(((parseFloat(el.value) || 0) / totalShares * amount).toFixed(2)),
      }));
      // Reconcile rounding to payer
      const sharesSum  = splits.reduce((s, x) => s + x.amount, 0);
      const sharesDiff = parseFloat((amount - sharesSum).toFixed(2));
      if (Math.abs(sharesDiff) > 0) {
        const payerSplit = splits.find(s => s.phone === paid_by) || splits[0];
        if (payerSplit) payerSplit.amount = parseFloat((payerSplit.amount + sharesDiff).toFixed(2));
      }
    } else if (activeSplitMethod === 'claim') {
      splits = computeClaimSplits();
      if (splits.length === 0) {
        showToast('No items claimed — assign items to people first', 'error');
        return;
      }
      // Ensure payer appears in splits (they may not have claimed anything)
      if (!splits.some(s => s.phone === paid_by)) {
        splits.push({ phone: paid_by, amount: 0 });
      }
    } else if (activeSplitMethod === 'adjustment') {
      const inputs   = [...$$('.split-adj-input')];
      const n        = includedAtSave.length;
      if (n === 0) { showToast('No members to split between', 'error'); return; }
      const totalAdj = inputs.reduce((s, el) => s + (parseFloat(el.value) || 0), 0);
      if (totalAdj > amount + 0.005) {
        showToast(`Adjustments exceed total by ${fmtCurrency((totalAdj - amount).toFixed(2), currency)}`, 'error');
        return;
      }
      const remainder = amount - totalAdj;
      const baseEach  = remainder / n;
      splits = inputs.map(el => ({
        phone:  el.dataset.phone,
        amount: parseFloat((baseEach + (parseFloat(el.value) || 0)).toFixed(2)),
      }));
      // Reconcile rounding to payer
      const adjSum  = splits.reduce((s, x) => s + x.amount, 0);
      const adjDiff = parseFloat((amount - adjSum).toFixed(2));
      if (Math.abs(adjDiff) > 0) {
        const payerSplit = splits.find(s => s.phone === paid_by) || splits[0];
        if (payerSplit) payerSplit.amount = parseFloat((payerSplit.amount + adjDiff).toFixed(2));
      }
    }

    const btn       = $('save-expense-btn');
    btn.disabled    = true;
    btn.textContent = 'Saving…';

    try {
      const expenseData = { description, amount, currency, paid_by, split_method: activeSplitMethod, note, expense_date, category: activeCategory };
      const { error } = editingExpenseId
        ? await Groups.updateExpense(editingExpenseId, expenseData, splits)
        : await Groups.addExpense(groupId, expenseData, splits);

      if (error) {
        console.error('saveExpense failed:', error);
        showToast(`Could not save expense: ${error?.message || error?.code || 'unknown'}`, 'error', 5000);
        return;
      }

      closeSheet('expense-backdrop', 'expense-sheet');
      showToast(editingExpenseId ? 'Expense updated' : 'Expense added', 'success');
      editingExpenseId = null;
      balancesLoaded = false;
      await loadExpenses();
    } finally {
      btn.disabled    = false;
      btn.textContent = editingExpenseId ? 'Save Changes' : 'Add Expense';
    }
  });

               style="flex:1;text-align:center;text-decoration:none;"

               style="flex:1;"
               data-from="${escHtml(t.from)}" data-from-name="${escHtml(t.fromName)}"
               data-to="${escHtml(t.to)}"     data-to-name="${escHtml(t.toName)}"
               data-amount="${t.amount}"
               onclick="event.stopPropagation()">Mark Settled</button>
          </div>` : isYouReceiving ? `
          <div class="bill-card-footer" style="gap:8px;margin-top:8px;align-items:center;">
            <span style="flex:1;font-size:13px;color:var(--text-muted);">Awaiting payment from ${escHtml(t.fromName)}</span>
            <button class="btn btn-secondary btn-sm mark-settled-inline-btn"
               data-from="${escHtml(t.from)}" data-from-name="${escHtml(t.fromName)}"
               data-to="${escHtml(t.to)}"     data-to-name="${escHtml(t.toName)}"
               data-amount="${t.amount}"
               onclick="event.stopPropagation()">They paid me</button>
          </div>` : ''}
        </div>
      `;
    }).join(''));

    $$('.mark-settled-inline-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        openSettleSheet(btn);
      });
    });

  // ── Settle-Up Sheet ───────────────────────────────────────
  let pendingSettle = null;

  function openSettleSheet(card) {
    const from = card.dataset.from;
    const to   = card.dataset.to;
    if (from !== user.phone && to !== user.phone) {
      showToast(`Only ${card.dataset.fromName} or ${card.dataset.toName} can record this payment`, 'error');
      return;
    }

    pendingSettle = {
      from:     from,
      fromName: card.dataset.fromName,
      to:       to,
      toName:   card.dataset.toName,
      amount:   parseFloat(card.dataset.amount),
    };

    const isYouPaying = from === user.phone;
    setText('settle-description',
      isYouPaying
        ? `You pay ${pendingSettle.toName} ${fmtCurrency(pendingSettle.amount, 'USD')}`
        : `${pendingSettle.fromName} paid you ${fmtCurrency(pendingSettle.amount, 'USD')}`
    );

    // Receiver recording a payment: Venmo deep link doesn't apply — default to cash
    activeSettleMethod = isYouPaying ? 'venmo' : 'cash';
    $$('[data-settle-method]').forEach(b => b.classList.toggle('active', b.dataset.settleMethod === activeSettleMethod));
    renderVenmoButton();
    $('settle-note').value = '';
    openSheet('settle-backdrop', 'settle-sheet');

      setHTML('venmo-settle-wrap', '');

    }
    const venmoHref = escHtml(`venmo://paycharge?txn=pay&amount=${pendingSettle.amount.toFixed(2)}&note=${encodeURIComponent('TAB: ' + pendingSettle.toName)}`);
    setHTML('venmo-settle-wrap', `
      <a href="${venmoHref}"
         class="btn btn-secondary btn-full" style="display:block;text-align:center;text-decoration:none;">
        Open Venmo — Pay ${fmtCurrency(pendingSettle.amount, 'USD')}

      <p style="font-size:12px;color:var(--text-muted);text-align:center;margin-top:6px;">Search for ${escHtml(pendingSettle.toName)} in Venmo, then tap "Mark as Settled" below.</p>
    `);

    setTimeout(() => $('member-name-input').focus(), 320);
  });
  $('close-add-member-btn').addEventListener('click', () => closeSheet('add-member-backdrop', 'add-member-sheet'));
  $('add-member-backdrop').addEventListener('click',  () => closeSheet('add-member-backdrop', 'add-member-sheet'));

  $('save-member-btn').addEventListener('click', async () => {
    const name  = $('member-name-input').value.trim();
    const raw   = $('member-phone-input').value.trim();
    if (!name)  { showToast('Enter a name', 'error'); return; }
    if (!raw)   { showToast('Enter a phone number', 'error'); return; }
    const phone = Auth.normalizePhone(raw);
    if (!phone) { showToast('Invalid phone number', 'error'); return; }

    const btn = $('save-member-btn');
    btn.disabled = true;
    btn.textContent = 'Adding…';
    try {
      const { error } = await Groups.addMember(groupId, phone, name);
      if (error) { showToast('Could not add member', 'error'); return; }
      closeSheet('add-member-backdrop', 'add-member-sheet');
      showToast(`${name} added`, 'success');
      const { data: m } = await Groups.getMembers(groupId);
      members = m || [];
      setText('group-meta', `${members.length} member${members.length !== 1 ? 's' : ''}`);
      renderMembers();
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add to Group';
    }
  });

  $('member-phone-input').addEventListener('input', e => {
    e.target.value = Auth.formatPhone(e.target.value);
  });

  // User search autocomplete for Add Member sheet
  attachUserSearch($('member-name-input'), $('member-phone-input'));

  // ── Settings Sheet ────────────────────────────────────────
  $('settings-btn').addEventListener('click',       () => openSheet('settings-backdrop', 'settings-sheet'));
  $('close-settings-btn').addEventListener('click', () => closeSheet('settings-backdrop', 'settings-sheet'));
  $('settings-backdrop').addEventListener('click',  () => closeSheet('settings-backdrop', 'settings-sheet'));

  $('toggle-close-btn').addEventListener('click', async () => {
    const btn = $('toggle-close-btn');
    const closing = !group.closed_at;

    if (!closing) {
      const { data: settlements } = await Groups.getSettlements(groupId);
      const count = (settlements || []).length;
      if (count > 0) {
        const ok = confirm(`${count} settlement${count !== 1 ? 's have' : ' has'} already been recorded. They'll remain logged and factor into the recalculated balance. Reopen anyway?`);
        if (!ok) return;
      }
    }

    btn.disabled = true;
    btn.textContent = closing ? 'Finalizing…' : 'Reopening…';
    try {
      const { error } = await Groups.closeGroup(groupId, !closing);
      if (error) { showToast('Could not update group', 'error'); return; }
      closeSheet('settings-backdrop', 'settings-sheet');
      if (closing) {
        group.closed_at = new Date().toISOString();
        show($('closed-banner'));
        $('add-expense-btn').disabled = true;
        $('add-expense-btn').textContent = 'Group Finalized';
        switchTab('balances');
        balancesLoaded = false;
        await loadBalances();
        showingSimplified = true;
        $('simplify-btn').textContent = 'Show All';
        $('balances-list').style.display = 'none';
        $('simplified-list').style.display = '';
        renderSimplified(Balance.simplify(window._lastBalances || []));
        showToast('Group finalized', 'success');
      } else {
        group.closed_at = null;
        hide($('closed-banner'));
        $('add-expense-btn').disabled = false;
        $('add-expense-btn').textContent = '+ Add Expense';
        showingSimplified = false;
        $('simplify-btn').textContent = 'Simplify';
        $('balances-list').style.display = '';
        $('simplified-list').style.display = 'none';
        switchTab('expenses');
        showToast('Group reopened', 'success');
      }
      btn.textContent = group.closed_at ? 'Reopen Group' : 'Finalize Group';
    } finally {
      btn.disabled = false;
    }
  });

  let deleteConfirmPending = false;
  let deleteConfirmTimer   = null;

  $('delete-group-btn').addEventListener('click', async () => {
    const btn = $('delete-group-btn');
    if (!deleteConfirmPending) {
      deleteConfirmPending = true;
      btn.textContent = 'Tap again to confirm delete';
      btn.style.background = '#7b1d1d';
      deleteConfirmTimer = setTimeout(() => {
        deleteConfirmPending = false;
        btn.textContent = 'Delete Group';
        btn.style.background = '';
      }, 4000);
      return;
    }
    clearTimeout(deleteConfirmTimer);
    deleteConfirmPending = false;
    btn.disabled = true;
    btn.textContent = 'Deleting…';
    try {
      const { error } = await Groups.deleteGroup(groupId);
      if (error) { showToast('Could not delete group', 'error'); btn.disabled = false; btn.textContent = 'Delete Group'; return; }
      navigateTo('/dashboard.html');
    } catch (err) {
      showToast('Could not delete group', 'error');
      btn.disabled = false;
      btn.textContent = 'Delete Group';
    }
  });

  // ── Receipt OCR ───────────────────────────────────────────
  $('scan-receipt-btn').addEventListener('click', () => $('exp-scan-input').click());

  $('exp-scan-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    $('exp-scanning-state').style.display = 'block';
    $('exp-items-preview').style.display  = 'none';
    $('scan-receipt-btn').disabled = true;

    try {
      let base64, mediaType;
      try {
        base64    = await compressImage(file);
        mediaType = 'image/jpeg';
      } catch {
        base64    = await fileToBase64(file);
        mediaType = file.type || 'image/jpeg';
      }

      const res = await fetch('/api/parse-receipt', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ image: base64, mediaType }),
      });
      if (!res.ok) throw new Error(`Server error ${res.status}`);
      const data = await res.json();
      if (data.error) throw new Error(data.error);

      if (data.restaurant && !$('exp-description').value.trim()) {
        $('exp-description').value = data.restaurant;
      }
      if (data.currency) $('exp-currency').value = data.currency;
      if (data.date && /^\d{4}-\d{2}-\d{2}$/.test(data.date)) $('exp-date').value = data.date;

      const items = data.items || [];
      const tax   = parseFloat(data.tax) || 0;
      scannedItems = items.map(it => ({
        name:     it.name,
        price:    parseFloat(it.price) || 0,
        quantity: parseInt(it.quantity, 10) || 1,
      }));
      claimsByUnit = {};
      if (activeSplitMethod === 'claim') renderSplitInputs();
      const total = items.reduce((s, it) => s + (parseFloat(it.price) || 0) * (parseInt(it.quantity, 10) || 1), 0) + tax;
      if (total > 0 && !$('exp-amount').value) {
        $('exp-amount').value = total.toFixed(2);
        renderSplitInputs();
      }

      if (items.length > 0) {
        const rows = items.map(it => {
          const qty = parseInt(it.quantity, 10) || 1;
          const price = (parseFloat(it.price) || 0).toFixed(2);
          return `<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border);">
            <span>${escHtml(it.name)}${qty > 1 ? ` ×${qty}` : ''}</span>
            <span style="font-weight:500;">${data.currency || 'USD'} ${price}</span>
          </div>`;
        }).join('');
        const taxLine = tax > 0
          ? `<div style="display:flex;justify-content:space-between;padding:3px 0;color:var(--text-muted);"><span>Tax</span><span>${data.currency || 'USD'} ${tax.toFixed(2)}</span></div>`
          : '';
        setHTML('exp-items-preview', `<div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-muted);margin-bottom:6px;">Receipt Items</div>${rows}${taxLine}`);
        $('exp-items-preview').style.display = 'block';
      }

      showToast('Receipt scanned!', 'success');
    } catch (err) {
      console.error('Receipt scan failed:', err);
      showToast(`Scan failed: ${err.message || 'unknown error'}`, 'error');
    } finally {
      $('exp-scanning-state').style.display = 'none';
      $('scan-receipt-btn').disabled = false;
      $('exp-scan-input').value = '';
    }
  });

  init();
</script>
</body>
</html>
