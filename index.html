<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab — Split bills beautifully</title>
  <meta name="description" content="Split restaurant bills with friends. Upload a receipt, share a link, everyone claims what they had." />
  <meta property="og:title"       content="Tab — Split bills beautifully" />
  <meta property="og:description" content="Split restaurant bills with friends. Upload a receipt, share a link, everyone claims what they had." />
  <meta property="og:type"        content="website" />
  <meta name="theme-color"        content="#B8872A" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧾</text></svg>" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="auth-page">
  <div class="auth-card fade-up">

    <div class="auth-brand">
      <div class="auth-logo">
        <svg width="44" height="53" viewBox="0 0 30 36" fill="none" aria-hidden="true">
          <rect x="1.5" y="1.5" width="27" height="30" rx="3" fill="currentColor" fill-opacity="0.12" stroke="currentColor" stroke-width="1.5"/>
          <path d="M7 12h16M7 18h16M7 24h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        tab
      </div>
      <p class="auth-tagline">Split bills beautifully</p>
    </div>

    <div class="auth-form" id="login-form">
      <div class="field">
        <label for="name-input">Your Name</label>
        <input
          class="input"
          id="name-input"
          type="text"
          placeholder="First name or full name"
          autocomplete="name"
          autofocus
        />
      </div>
      <div class="field">
        <label for="phone-input">Phone Number</label>
        <input
          class="input"
          id="phone-input"
          type="tel"
          placeholder="(555) 555-5555"
          autocomplete="tel"
        />
        <span class="text-muted" style="font-size:12px;margin-top:2px;">
          Used to find your bills — no texts will be sent.
        </span>
      </div>
      <button class="btn btn-primary btn-full btn-lg mt-4" id="login-btn">
        Get Started
      </button>
    </div>

    <p class="auth-footer">
      By continuing, you agree to share your name and phone number
      with other users of bills you join.
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/utils.js"></script>
<script>
  if (Auth.getUser()) {
    window.location.replace('/dashboard.html');
  }

  const nameInput  = $('name-input');
  const phoneInput = $('phone-input');
  const loginBtn   = $('login-btn');

  phoneInput.addEventListener('input', () => {
    let digits = phoneInput.value.replace(/\D/g, '');
    if (digits.length === 11 && digits[0] === '1') digits = digits.slice(1);
    if (digits.length <= 3)       phoneInput.value = digits;
    else if (digits.length <= 6)  phoneInput.value = `(${digits.slice(0,3)}) ${digits.slice(3)}`;
    else if (digits.length <= 10) phoneInput.value = `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6)}`;
    else                          phoneInput.value = `(${digits.slice(0,3)}) ${digits.slice(3,6)}-${digits.slice(6,10)}`;
  });

  loginBtn.addEventListener('click', handleLogin);
  [nameInput, phoneInput].forEach(el =>
    el.addEventListener('keydown', e => e.key === 'Enter' && handleLogin())
  );

  async function handleLogin() {
    const name  = nameInput.value.trim();
    const phone = Auth.normalizePhone(phoneInput.value);

    if (!name)            return showToast('Please enter your name', 'error');
    if (phone.length < 10) return showToast('Please enter a valid phone number', 'error');

    loginBtn.disabled    = true;
    loginBtn.textContent = 'Loading…';

    const fp = Auth.getFingerprint();
    Auth.setUser(name, phone);

    try {
      await Promise.all([
        db.from('guests').update({ device_fingerprint: fp, name }).eq('phone', phone),
        db.from('users').upsert({ phone, name, updated_at: new Date().toISOString() }, { onConflict: 'phone', ignoreDuplicates: false }),
      ]);
    } catch { /* non-critical */ }

    const returnUrl = sessionStorage.getItem('tab_return_url');
    if (returnUrl) {
      sessionStorage.removeItem('tab_return_url');
      window.location.replace(returnUrl);
    } else {
      window.location.replace('/dashboard.html');
    }
  }
</script>
</body>
</html>
